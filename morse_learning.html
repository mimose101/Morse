<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>摩斯密码学习应用</title>
    <!-- 引入高质感现代 Google 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-green: #58CC02;
            --color-green-dark: #46A302;
            --color-blue: #1CB0F6;
            --color-blue-dark: #1899D6;
            --color-yellow: #FFC800;
            --color-yellow-dark: #E6B400;
            --color-red: #FF4B4B;
            --color-red-dark: #EA2B2B;
            --color-gray-border: #E5E5E5;
            --color-text-dark: #3C3C3C;
            --color-text-light: #AFAFAF;
            --color-bg-light: #F7F7F7;
            --color-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--color-bg-light);
            color: var(--color-text-dark);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow: hidden; /* 防止桌面或老设备页面全局滚动 */
        }

        /* 应用主体，限制最大宽度以适配手机和桌面居中 */
        .app-container {
            width: 100%;
            max-width: 540px;
            background-color: var(--color-white);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden; /* 所有页面内容都在容器内部自主滚动 */
        }

        /* 隐藏元素的类 */
        .hidden {
            display: none !important;
        }

        /* 立体按钮 */
        .duo-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .duo-btn-green {
            background-color: var(--color-green);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-green-dark);
        }

        .duo-btn-green:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-green-dark);
        }

        .duo-btn-blue {
            background-color: var(--color-blue);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-blue-dark);
        }

        .duo-btn-blue:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-blue-dark);
        }

        .duo-btn-yellow {
            background-color: var(--color-yellow);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-yellow-dark);
        }

        .duo-btn-yellow:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-yellow-dark);
        }

        .duo-btn-red {
            background-color: var(--color-red);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-red-dark);
        }

        .duo-btn-red:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-red-dark);
        }

        .duo-btn-gray {
            background-color: var(--color-white);
            color: var(--color-text-light);
            border: 2px solid var(--color-gray-border);
            box-shadow: 0 4px 0 var(--color-gray-border);
        }

        .duo-btn-gray:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .duo-btn-disabled {
            background-color: #E5E5E5 !important;
            color: #AFAFAF !important;
            box-shadow: 0 4px 0 #CCCCCC !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 顶部导航状态栏 */
        .top-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 800;
        }

        .status-icon {
            font-size: 20px;
        }

        .status-streak { color: #FF9600; }
        .status-xp { color: var(--color-yellow); }
        .status-heart { color: var(--color-red); }

        /* ================= SCREEN: HOME ================= */
        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
        }

        .map-title {
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            margin: 24px 0 10px 0;
            color: var(--color-text-dark);
            flex-shrink: 0;
        }

        /* 蜿蜒关卡地图容器 */
        .level-map-container {
            flex: 1;
            position: relative;
            margin: 20px 0;
            padding: 0 40px;
            min-height: 850px;
        }

        .level-map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .level-nodes-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .level-node-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* 关卡球样式 */
        .level-circle {
            width: 70px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--color-white);
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .level-circle.locked {
            background-color: #E5E5E5;
            box-shadow: 0 6px 0 #BDBDBD;
            color: #AFAFAF;
            cursor: not-allowed;
        }

        .level-circle.unlocked {
            background-color: var(--color-green);
            box-shadow: 0 8px 0 var(--color-green-dark);
        }

        .level-circle.unlocked:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--color-green-dark);
        }

        .level-circle.completed {
            background-color: var(--color-yellow);
            box-shadow: 0 8px 0 var(--color-yellow-dark);
        }

        .level-circle.completed:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--color-yellow-dark);
        }

        .level-circle.unlocked.active-level::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 3px dashed var(--color-green);
            animation: rotate-outline 8s linear infinite;
        }

        @keyframes rotate-outline {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 悬浮提示框 (类似于关卡地图的悬浮小卡片) */
        .level-tooltip {
            position: absolute;
            background-color: var(--color-text-dark);
            color: var(--color-white);
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 10;
        }

        .level-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--color-text-dark) transparent transparent transparent;
        }

        .level-circle:hover .level-tooltip {
            opacity: 1;
            transform: translate(-50%, -5px);
        }

        /* 底部操作区 */
        .home-footer {
            padding: 10px 24px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            flex-shrink: 0;
        }

        /* ================= SCREEN: LESSON ================= */
        #lesson-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .lesson-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            gap: 16px;
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            flex-shrink: 0;
        }

        .close-btn {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-text-light);
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
        }

        .close-btn:hover {
            color: var(--color-text-dark);
        }

        /* 进度条 */
        .progress-bar-container {
            flex: 1;
            height: 16px;
            background-color: var(--color-gray-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--color-green);
            border-radius: 8px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 进度条内反光效果 */
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 5px;
            right: 5px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 1.5px;
        }

        .lesson-hearts {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 800;
            color: var(--color-red);
        }

        .lesson-body {
            flex: 1;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ================= SUB-PHASE: PREVIEW ================= */
        .preview-phase {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
        }

        .preview-desc {
            font-size: 15px;
            color: var(--color-text-light);
            margin-bottom: 24px;
            text-align: center;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .preview-cards-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            margin-bottom: 30px;
        }

        .preview-card {
            background: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 20px;
            width: 150px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--color-gray-border);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .preview-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .preview-card-char {
            font-size: 40px;
            font-weight: 800;
            color: var(--color-text-dark);
            margin-bottom: 8px;
        }

        .preview-card-morse {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-blue);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .play-preview-icon {
            width: 44px;
            height: 44px;
            background-color: rgba(28, 176, 246, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-blue);
            font-size: 18px;
        }

        .preview-card:hover .play-preview-icon {
            background-color: var(--color-blue);
            color: var(--color-white);
        }

        /* Mnemonic Overlay Container */
        .mnemonic-container {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #ffffff 0%, #f5f6f8 100%);
            border: 2px solid #eaeaea;
            border-radius: 24px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), inset 0 2px 5px rgba(255, 255, 255, 0.6);
        }

        .mnemonic-letter-bg {
            font-family: 'Roboto', 'Arial Black', sans-serif;
            font-size: 160px;
            font-weight: 900;
            color: #f0f1f4;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8), -1px -1px 0px rgba(0, 0, 0, 0.03);
            line-height: 1;
            z-index: 1;
            /* 关键：让子元素（点划）的百分比坐标相对于字母文字本身，与编辑器一致 */
            position: relative;
        }

        .m-element {
            position: absolute;
            background: linear-gradient(135deg, #4d4d4d 0%, #222222 100%);
            border: 2px solid var(--color-white);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15), 0 8px 16px rgba(0, 0, 0, 0.08);
            z-index: 2;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .m-element:hover {
            background: linear-gradient(135deg, #28b8f8 0%, #0087d1 100%);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12), 0 12px 20px rgba(28, 176, 246, 0.2);
        }

        .m-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .m-dash {
            width: 24px;
            height: 64px;
            border-radius: 10px;
        }

        /* 闪烁状态的亮绿色发光样式 */
        .m-element.active-blink {
            background: linear-gradient(135deg, #7be11a 0%, #58cc02 100%) !important;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.8), 0 4px 0 #46a302 !important;
            border-color: var(--color-white) !important;
            transform: scale(1.05);
        }

        /* ================= SCREEN: LESSON CARD PHASES ================= */
        .lesson-question-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex: 1;
        }

        .question-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--color-text-dark);
            text-align: left;
            width: 100%;
        }

        /* 题型 1: 听音辨字 */
        .audio-buttons-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .audio-play-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--color-blue);
            border: none;
            color: var(--color-white);
            font-size: 26px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--color-blue-dark);
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .audio-play-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--color-blue-dark);
        }



        /* 多选一网格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .option-card {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 14px 10px;
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--color-gray-border);
            transition: all 0.1s ease;
            position: relative;
        }

        .option-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .option-card.selected {
            border-color: #84D8FF;
            background-color: #E1F5FE;
            box-shadow: 0 4px 0 #84D8FF;
            color: #0079C1;
        }

        .option-card.selected:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #84D8FF;
        }

        .option-shortcut {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 11px;
            color: var(--color-text-light);
            border: 1px solid var(--color-gray-border);
            border-radius: 4px;
            padding: 1px 4px;
        }

        /* 题型 2: 输入摩斯码 */
        .input-code-display {
            min-height: 64px;
            background-color: var(--color-bg-light);
            border: 2px solid var(--color-gray-border);
            border-radius: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            padding: 10px 20px;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.03);
        }

        .input-code-display.has-content {
            background-color: var(--color-white);
            border-color: var(--color-blue);
            box-shadow: 0 0 0 4px rgba(28, 176, 246, 0.15), inset 0 1px 2px rgba(0, 0, 0, 0.01);
        }

        .display-placeholder {
            font-size: 16px;
            font-weight: 800;
            color: var(--color-text-light);
            letter-spacing: 0.5px;
        }

        .morse-input-panel {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .morse-input-btn, .morse-backspace-btn {
            flex: 1;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            padding: 6px 0;
            max-width: 130px;
        }

        .morse-input-btn .btn-symbol, .morse-backspace-btn .btn-symbol {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .morse-backspace-btn .btn-symbol {
            font-size: 24px;
            font-weight: 800;
        }

        .btn-label {
            font-size: 12px;
            font-weight: 800;
            opacity: 0.85;
            letter-spacing: 0.5px;
        }

        .duo-btn-blue .btn-label {
            color: rgba(255, 255, 255, 0.9);
        }

        .duo-btn-gray .btn-label {
            color: var(--color-text-light);
        }

        .keyboard-hint {
            font-size: 13px;
            color: var(--color-text-light);
            margin-top: 8px;
            text-align: center;
        }

        /* 题型 3: 配对连线 */
        .matching-columns {
            display: flex;
            width: 100%;
            gap: 20px;
            justify-content: space-between;
        }

        .matching-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 12px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--color-gray-border);
            transition: all 0.1s ease;
        }

        .match-card:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .match-card.selected {
            border-color: #84D8FF;
            background-color: #E1F5FE;
            box-shadow: 0 3px 0 #84D8FF;
            color: #0079C1;
        }

        .match-card.selected:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #84D8FF;
        }

        .match-card.paired {
            border-color: #B2FF59 !important;
            background-color: #F1F8E9 !important;
            color: #558B2F !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.8;
        }

        .match-card.error-blink {
            border-color: #FF8A80;
            background-color: #FFEBEE;
            box-shadow: 0 3px 0 #FF8A80;
            color: #C62828;
            animation: shake 0.2s linear infinite;
        }

        /* CSS Shake 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* 题型 4: 翻译识别 */
        .translation-input-box {
            width: 100%;
            height: 80px;
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 16px;
            font-size: 20px;
            font-weight: 800;
            color: var(--color-text-dark);
            outline: none;
            resize: none;
            margin-bottom: 20px;
            text-align: center;
        }

        .translation-input-box:focus {
            border-color: var(--color-blue);
        }

        /* ================= FOOTER CONTROL PANEL (DUOLINGO FEEDBACK) ================= */
        .lesson-footer-panel {
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            border-top: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: background-color 0.2s ease;
            flex-shrink: 0;
        }

        .feedback-row {
            display: flex;
            align-items: center;
            gap: 16px;
            display: none;
        }

        .feedback-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .feedback-text-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 800;
        }

        .feedback-message {
            font-size: 14px;
            font-weight: 600;
        }

        /* 正确状态反馈框 */
        .feedback-correct {
            background-color: #D7FFB8;
            border-top-color: #B2F374;
        }

        .feedback-correct .feedback-icon-container {
            background-color: var(--color-white);
            color: var(--color-green);
        }

        .feedback-correct .feedback-title {
            color: #2B7A00;
        }

        .feedback-correct .feedback-message {
            color: #3C8A00;
        }

        /* 错误状态反馈框 */
        .feedback-incorrect {
            background-color: #FFDFDF;
            border-top-color: #FFC0C0;
        }

        .feedback-incorrect .feedback-icon-container {
            background-color: var(--color-white);
            color: var(--color-red);
        }

        .feedback-incorrect .feedback-title {
            color: #EA2B2B;
        }

        .feedback-incorrect .feedback-message {
            color: #EA2B2B;
        }

        /* 动画类：心形抖动与破碎 */
        @keyframes heart-crack {
            0% { transform: scale(1); }
            15% { transform: scale(1.3) rotate(-15deg); }
            30% { transform: scale(1.3) rotate(15deg); }
            45% { transform: scale(1.3) rotate(-15deg); }
            60% { transform: scale(0.9) rotate(0deg); opacity: 0.5; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .heart-shattered {
            animation: heart-crack 0.6s ease-in-out;
        }

        /* ================= SCREEN: RESULT ================= */
        #result-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            padding-top: calc(40px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
            text-align: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .stars-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .result-star {
            font-size: 50px;
            color: #E5E5E5;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.4s ease;
        }

        .result-star.active {
            color: var(--color-yellow);
            text-shadow: 0 0 10px rgba(255, 200, 0, 0.3);
            transform: scale(1.2) rotate(15deg);
        }

        .result-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--color-green);
            margin-bottom: 16px;
        }

        .result-stats-row {
            display: flex;
            width: 100%;
            justify-content: space-around;
            margin-bottom: 40px;
            gap: 12px;
        }

        .result-stat-card {
            flex: 1;
            background: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 0 var(--color-gray-border);
        }

        .stat-card-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--color-text-light);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-text-dark);
        }

        .stat-card-value.xp-gain {
            color: var(--color-yellow-dark);
        }

        /* ================= MODAL OVERLAYS ================= */
        .modal-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 24px;
        }

        .modal-box {
            background-color: var(--color-white);
            border-radius: 24px;
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: modal-enter 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modal-enter {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 54px;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-text-dark);
            margin-bottom: 12px;
        }

        .modal-desc {
            font-size: 15px;
            color: var(--color-text-light);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* XP数值发光或特效 */
        .xp-display-glow {
            text-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
        }

        /* ================= HIGH-QUALITY GRAPHICAL MORSE (VISUAL MORSE) ================= */
        .morse-visual-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            vertical-align: middle;
        }
        
        .morse-visual-char {
            display: inline-block;
            background-color: var(--color-blue);
            height: 12px;
            border-radius: 6px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        
        .morse-visual-dot {
            width: 12px;
        }
        
        .morse-visual-dash {
            width: 32px;
        }

        /* 答对反馈栏中的点划颜色 */
        .feedback-correct .morse-visual-char {
            background-color: var(--color-green);
        }

        /* 答错反馈栏中的点划颜色 */
        .feedback-incorrect .morse-visual-char {
            background-color: var(--color-red);
        }

        /* ================= SCREEN: WELCOME (PORTAL) ================= */
        #welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }

        .welcome-hero-container {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
        }

        /* 纯 CSS 3D 发报电键 */
        .telegraph-machine {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
            transform: scale(0.9);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .telegraph-machine:hover {
            transform: scale(0.95);
        }

        .telegraph-base {
            width: 90px;
            height: 24px;
            background: linear-gradient(135deg, #795548 0%, #4E342E 100%);
            border-radius: 6px;
            position: absolute;
            bottom: 15px;
            left: 5px;
            box-shadow: 0 6px 0 #3E2723, 0 12px 20px rgba(0,0,0,0.15);
        }

        .telegraph-arm {
            width: 60px;
            height: 10px;
            background: linear-gradient(to right, #B0BEC5, #78909C);
            position: absolute;
            bottom: 35px;
            left: 20px;
            transform-origin: 10px 5px;
            transform: rotate(-15deg);
            border-radius: 3px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
            animation: telegraph-bounce 3s ease-in-out infinite;
        }

        .telegraph-knob {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #37474F 0%, #212121 100%);
            border-radius: 50%;
            position: absolute;
            right: -5px;
            top: -12px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), 0 3px 0 #1A1A1A, 0 5px 8px rgba(0,0,0,0.2);
        }

        .telegraph-ripple {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px dashed rgba(88, 204, 2, 0.4);
            border-radius: 50%;
            top: 10px;
            left: 10px;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            pointer-events: none;
        }

        @keyframes telegraph-bounce {
            0%, 100% { transform: rotate(-12deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--color-text-dark);
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--color-text-dark) 30%, #58cc02 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .welcome-subtitle {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-light);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* 欢迎页用户看板 */
        .welcome-user-preview {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 20px;
            padding: 12px 16px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--color-gray-border);
            transition: transform 0.1s, box-shadow 0.1s, border-color 0.2s;
        }

        .welcome-user-preview:hover {
            border-color: var(--color-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--color-gray-border);
        }

        .welcome-user-preview:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .user-preview-avatar {
            font-size: 36px;
            background-color: var(--color-bg-light);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex; 
            justify-content: center;
            align-items: center;
            border: 2px solid var(--color-gray-border);
        }

        .user-preview-info {
            flex: 1;
            text-align: left;
        }

        .user-preview-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--color-text-dark);
            margin-bottom: 4px;
        }

        .user-preview-stats {
            font-size: 13px;
            font-weight: 800;
            color: var(--color-text-light);
        }

        .user-preview-arrow {
            font-size: 20px;
            color: var(--color-text-light);
            transition: transform 0.2s;
        }

        .welcome-user-preview:hover .user-preview-arrow {
            color: var(--color-blue);
            transform: translateX(4px);
        }

        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 380px;
        }

        .welcome-buttons .duo-btn {
            width: 100%;
            padding: 16px 24px;
            font-size: 18px;
        }

        /* ================= SCREEN: CODEBOOK ================= */
        #codebook-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .codebook-header {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .profile-header {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .back-home-btn {
            background: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 12px;
            width: 44px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--color-gray-border);
            transition: transform 0.08s, box-shadow 0.08s;
            margin-right: 16px;
        }

        .back-home-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .codebook-title, .profile-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--color-text-dark);
        }

        /* 搜索框与筛选 */
        .codebook-search-container {
            padding: 16px 24px;
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            font-size: 16px;
            color: var(--color-text-light);
            pointer-events: none;
        }

        #codebook-search-input {
            width: 100%;
            height: 48px;
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 0 44px;
            font-size: 15px;
            font-weight: 800;
            color: var(--color-text-dark);
            background-color: var(--color-bg-light);
            outline: none;
            transition: all 0.2s;
        }

        #codebook-search-input:focus {
            border-color: var(--color-blue);
            background-color: var(--color-white);
            box-shadow: 0 0 0 4px rgba(28, 176, 246, 0.12);
        }

        .search-clear-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            font-size: 16px;
            color: var(--color-text-light);
            cursor: pointer;
            padding: 4px;
        }

        .search-clear-btn:hover {
            color: var(--color-text-dark);
        }

        .codebook-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }

        .codebook-tabs::-webkit-scrollbar {
            display: none;
        }

        .codebook-tab {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 14px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 800;
            color: var(--color-text-light);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .codebook-tab.active {
            background-color: var(--color-blue);
            color: var(--color-white);
            border-color: var(--color-blue-dark);
            box-shadow: 0 3px 0 var(--color-blue-dark);
        }

        .codebook-tab.active:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* 密码本卡片列表 */
        .codebook-grid-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px 16px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            background-color: var(--color-bg-light);
        }

        .codebook-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 调整为3列等宽 */
            gap: 10px;
        }

        .codebook-card {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--color-gray-border);
            transition: transform 0.08s, box-shadow 0.08s, border-color 0.15s;
            position: relative;
            min-height: 140px; /* 容纳缩放后的联想记忆框和微型点划 */
            overflow: hidden;
        }

        .codebook-card:hover {
            border-color: var(--color-blue);
        }

        .codebook-card:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .codebook-card.playing {
            border-color: var(--color-green);
            background-color: #F1F8E9;
            box-shadow: 0 3px 0 var(--color-green-dark);
            transform: scale(0.97);
        }

        /* 密码本卡片内嵌入联想记忆框的缩放排版 */
        .codebook-mnemonic-wrap {
            width: 76.8px;
            height: 76.8px;
            position: relative;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .codebook-mnemonic-wrap .mnemonic-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 240px;
            transform: scale(0.32);
            transform-origin: top left;
            pointer-events: none; /* 卡片整体响应即可 */
            border: none;
            background: none;
            box-shadow: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 对没有联想图的常用词卡片，采用整行跨列展示 */
        .codebook-card.word-type {
            grid-column: span 3; /* 跨满3列 */
            min-height: 64px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
        }

        .codebook-card-char {
            font-size: 16px;
            font-weight: 800;
            color: var(--color-text-dark);
            margin-top: 4px;
        }

        .codebook-card.word-type .codebook-card-char {
            font-size: 20px;
            font-weight: 900;
            margin-top: 0;
        }

        .codebook-card-morse {
            margin-top: auto;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .codebook-card.word-type .codebook-card-morse {
            margin-top: 0;
            width: auto;
            display: inline-flex;
        }

        /* 密码本卡片内微缩版 Visual Morse */
        .codebook-card .morse-visual-char {
            height: 6px;
            border-radius: 3px;
        }

        .codebook-card .morse-visual-dot {
            width: 6px;
        }

        .codebook-card .morse-visual-dash {
            width: 16px;
        }

        .codebook-card .morse-visual-container {
            gap: 3px;
        }

        .codebook-card-play {
            position: absolute;
            right: 8px;
            top: 8px;
            font-size: 10px;
            color: var(--color-text-light);
            background-color: var(--color-bg-light);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .codebook-card.word-type .codebook-card-play {
            position: static;
            margin-left: 8px;
        }

        .codebook-card.playing .codebook-card-play {
            background-color: var(--color-green);
            color: var(--color-white);
        }

        .codebook-empty { 
            grid-column: span 2;
            text-align: center;
            padding: 40px 0;
            color: var(--color-text-light);
            font-weight: 800;
            font-size: 15px;
        }

        /* ================= SCREEN: PROFILE ================= */
        #profile-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
            background-color: var(--color-bg-light);
        }

        /* 矮屏手机适配 (例如 iPhone SE, 较矮的分辨率) */
        @media (max-height: 680px) {
            .welcome-hero-container {
                width: 120px;
                height: 120px;
                margin-bottom: 10px;
            }
            .telegraph-machine {
                transform: scale(0.8);
            }
            .telegraph-machine:hover {
                transform: scale(0.85);
            }
            .welcome-title {
                font-size: 24px;
            }
            .welcome-subtitle {
                margin-bottom: 15px;
            }
            .welcome-user-preview {
                margin-bottom: 15px;
                padding: 10px 14px;
            }
            .welcome-buttons {
                gap: 8px;
            }
            .welcome-buttons .duo-btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            .mnemonic-container {
                width: 170px;
                height: 170px;
                margin-bottom: 8px;
            }
            .mnemonic-letter-bg {
                font-size: 110px;
            }
            .m-dot {
                width: 18px;
                height: 18px;
            }
            .m-dash {
                width: 18px;
                height: 42px;
            }
            .option-card {
                padding: 12px 8px;
                font-size: 18px;
            }
            .question-title {
                margin-bottom: 12px;
                font-size: 18px;
            }
            .audio-play-btn {
                width: 64px;
                height: 64px;
                font-size: 24px;
            }
            .morse-input-panel {
                margin-bottom: 10px;
            }
            .morse-input-btn, .morse-backspace-btn {
                height: 56px;
            }
            .input-code-display {
                min-height: 48px;
                margin-bottom: 12px;
                padding: 6px 12px;
            }
            .match-card {
                height: 40px;
                font-size: 16px;
            }
        }

        .profile-user-card {
            background-color: var(--color-white);
            border-bottom: 2px solid var(--color-gray-border);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-avatar-container {
            position: relative;
            cursor: pointer;

        const morseData = {

        // ================= WEB AUDIO PLAYER =================
        class MorsePlayer {
            constructor() {
                this.audioCtx = null;
                this.frequency = 680;
                this.oscillator = null;
                this.gainNode = null;
            }

            init() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }
            }

            play(morseCode, speedMultiplier = 1.0) {
                this.init();
                this.stop();

                const baseUnit = 80 * speedMultiplier; // ms
                const dotDuration = baseUnit / 1000;
                const dashDuration = (baseUnit * 3) / 1000;
                const intraGap = baseUnit / 1000;

                let time = this.audioCtx.currentTime + 0.05;

                this.oscillator = this.audioCtx.createOscillator();
                this.gainNode = this.audioCtx.createGain();

                this.oscillator.type = 'sine';
                this.oscillator.frequency.value = this.frequency;
                
                // 初始静音
                this.gainNode.gain.setValueAtTime(0, this.audioCtx.currentTime);

                for (let i = 0; i < morseCode.length; i++) {
                    const char = morseCode[i];
                    if (char === '.' || char === '-') {
                        const duration = (char === '.') ? dotDuration : dashDuration;
                        
                        // 线性渐变淡入淡出，消除切换卡嗒声
                        this.gainNode.gain.setValueAtTime(0, time);
                        this.gainNode.gain.linearRampToValueAtTime(0.8, time + 0.005);
                        this.gainNode.gain.setValueAtTime(0.8, time + duration - 0.005);
                        this.gainNode.gain.linearRampToValueAtTime(0, time + duration);

                        time += duration + intraGap;
                    } else if (char === ' ') {
                        // 单词中字母之间的停顿时间（额外增加 2 个基准时间间隔，连同 intraGap 构成标准字符停顿）
                        time += (baseUnit * 2) / 1000;
                    }
                }

                this.oscillator.connect(this.gainNode);
                this.gainNode.connect(this.audioCtx.destination);

                this.oscillator.start();
                this.oscillator.stop(time);
            }

            stop() {
                if (this.oscillator) {
                    try {
                        this.oscillator.stop();
                    } catch(e) {}
                    this.oscillator.disconnect();
                    this.oscillator = null;
                }
            }

            playFeedbackSound(isCorrect) {
                this.init();
                const now = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                if (isCorrect) {
                    // 答对：欢快的双音（880Hz -> 1174Hz）
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1174, now + 0.08);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.4, now + 0.01);
                    gain.gain.setValueAtTime(0.4, now + 0.18);
                    gain.gain.linearRampToValueAtTime(0, now + 0.22);
                    
                    osc.start(now);
                    osc.stop(now + 0.22);
                } else {
                    // 答错：低频的降调蜂鸣（220Hz）
                    osc.frequency.setValueAtTime(220, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.5, now + 0.01);
                    gain.gain.setValueAtTime(0.5, now + 0.25);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    
                    osc.start(now);
                    osc.stop(now + 0.3);
                }
            }
        }

        function getMorseVisualHtml(morseCode) {
            if (!morseCode) return '';
            let html = '<span class="morse-visual-container">';
            for (let char of morseCode) {
                if (char === '.') {
                    html += '<span class="morse-visual-char morse-visual-dot"></span>';
                } else if (char === '-') {
                    html += '<span class="morse-visual-char morse-visual-dash"></span>';
                } else if (char === ' ') {
                    html += '<span style="width: 10px;"></span>';
                }
            }
            html += '</span>';
            return html;
        }

        function renderCodebook() {
            const grid = document.getElementById('codebook-grid-items');
            grid.innerHTML = '';
            
            const filtered = codebookItems.filter(item => {
                const matchesTab = (codebookFilterTab === 'all' || item.type === codebookFilterTab);
                const query = codebookSearchQuery.trim().toLowerCase();
                if (!query) return matchesTab;
                
                const matchesChar = item.char.toLowerCase().includes(query);
                const matchesMorse = item.morse.includes(query);
                return matchesTab && (matchesChar || matchesMorse);
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="codebook-empty">没有找到匹配的摩斯密码</div>`;
                return;
            }
            
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'codebook-card';
                card.id = `codebook-card-${item.char}`;
                card.onclick = () => {
                    playCodebookItem(item.char, item.morse);
                };
                
                if (item.type === 'word') {
                    // 单词类型：跨列通栏，不放图形，显示大字
                    card.classList.add('word-type');
                    card.innerHTML = `
                        <div class="codebook-card-char">${item.char}</div>
                        <div class="codebook-card-morse">${getMorseVisualHtml(item.morse)}</div>
                        <div class="codebook-card-play">🔊</div>
                    `;
                } else {
                    // 字母与数字类型：包含图形联想（嵌入了缩放容器中）
                    card.innerHTML = `
                        <div class="codebook-card-play">🔊</div>
                        <div class="codebook-mnemonic-wrap">
                            <div class="mnemonic-container">
                                ${renderMnemonicSvg(item.char)}
                            </div>
                        </div>
                        <div class="codebook-card-char">${item.char}</div>
                        <div class="codebook-card-morse">${getMorseVisualHtml(item.morse)}</div>
                    `;
                }
                grid.appendChild(card);
            });
        }

        // 辅助在特定的卡片容器内寻找点划索引并精准高亮
        function flashMnemonicElementsInContainer(containerDom, char, speedMultiplier = 1.0) {
            let config = null;
            const savedData = localStorage.getItem(`morse_pos_${char}`);
            if (savedData) {
                try { config = JSON.parse(savedData); } catch(e){}
            }
            if (!config) {
                config = letterVisualConfigs[char];
            }
            if (!config) return;

            const baseUnit = 80 * speedMultiplier;
            const dotDuration = baseUnit;
            const dashDuration = baseUnit * 3;
            const intraGap = baseUnit;

            let delay = 50;

            config.forEach((elConfig, idx) => {
                const duration = elConfig.type === 'dot' ? dotDuration : dashDuration;
                
                setTimeout(() => {
                    const elDom = containerDom.querySelector(`[data-index="${idx}"]`);
                    if (elDom) {
                        elDom.classList.add('active-blink');
                        setTimeout(() => {
                            elDom.classList.remove('active-blink');
                        }, duration);
                    }
                }, delay);

                delay += duration + intraGap;
            });
        }

        function playCodebookItem(char, morse) {
            morsePlayer.play(morse, 1.0);
            
            const card = document.getElementById(`codebook-card-${char}`);
            if (card) {
                card.classList.add('playing');
                // 让当前卡片内缩放的记忆点划进行顺序闪烁
                flashMnemonicElementsInContainer(card, char);
                
                // 下方的微缩版 Visual Morse 同步亮起
                const visualChars = card.querySelectorAll('.codebook-card-morse .morse-visual-char');
                visualChars.forEach(vc => vc.classList.add('active-blink'));
                
                const baseUnit = 80;
                let duration = 0;
                for (let c of morse) {
                    if (c === '.') duration += baseUnit;
                    else if (c === '-') duration += baseUnit * 3;
                    else if (c === ' ') duration += baseUnit * 3;
                    duration += baseUnit;
                }
                
                setTimeout(() => {
                    card.classList.remove('playing');
                    visualChars.forEach(vc => vc.classList.remove('active-blink'));
                }, duration + 50);
            }
        }

        function renderLevelMap() {

            const container = document.getElementById('level-map-container');

            const steps = levels.length;
            const nodes = [];

            levels.forEach((lvl, idx) => {
                const nodeRow = document.createElement('div');
                nodeRow.className = 'level-node-row';

                // 使用正弦曲线计算横向偏移，形成流畅蛇形蜿蜒
                const xOffset = Math.sin(idx * 1.2) * 85; 
                
                const circle = document.createElement('div');
                circle.className = 'level-circle';
                
                // 关卡锁定/解锁样式判定
                if (lvl.id < state.unlockedLevel) {
                    circle.classList.add('completed');
                    circle.innerHTML = '★'; // 通关显示星星
                } else if (lvl.id === state.unlockedLevel) {
                    circle.classList.add('unlocked', 'active-level');
                    circle.innerHTML = lvl.id;
                } else {
                    circle.classList.add('locked');
                    circle.innerHTML = '🔒';
                }

                // 悬浮泡泡
                const tooltip = document.createElement('div');
                tooltip.className = 'level-tooltip';
                tooltip.innerHTML = `<strong>${lvl.name}</strong><br>${lvl.desc}`;
                circle.appendChild(tooltip);

                // 点击进入关卡
                circle.onclick = () => {
                    if (lvl.id <= state.unlockedLevel) {
                        startLesson(lvl.id);
                    }
                };

                circle.style.transform = `translateX(${xOffset}px)`;
                nodeRow.appendChild(circle);
                wrapper.appendChild(nodeRow);

                // 缓存中心点位置以便绘制连接SVG虚线
                nodes.push({ x: xOffset, id: lvl.id });
            });

            // 绘制SVG连接折线
            setTimeout(() => {
                const svg = document.getElementById('map-svg');
                const path = document.getElementById('map-path');
                const circles = document.querySelectorAll('.level-circle');
                
                if (circles.length === 0) return;

                const containerRect = document.getElementById('level-map-container').getBoundingClientRect();
                let pathD = '';

                circles.forEach((c, idx) => {
                    const r = c.getBoundingClientRect();
                    const cx = (r.left + r.right) / 2 - containerRect.left;
                    const cy = (r.top + r.bottom) / 2 - containerRect.top;

                    if (idx === 0) {
                        pathD += `M ${cx} ${cy}`;
                    } else {
                        // 使用贝塞尔曲线使连线圆润平滑
                        const prevR = circles[idx - 1].getBoundingClientRect();
                        const prevCx = (prevR.left + prevR.right) / 2 - containerRect.left;
                        const prevCy = (prevR.top + prevR.bottom) / 2 - containerRect.top;
                        const midY = (prevCy + cy) / 2;
                        pathD += ` C ${prevCx} ${midY}, ${cx} ${midY}, ${cx} ${cy}`;
                    }
                });

                path.setAttribute('d', pathD);
            }, 100);
        }

        // ================= LESSON ENGINE =================
        function startLesson(levelId) {
            morsePlayer.init(); // 允许音频环境激活

            currentLesson.id = levelId;
            currentLesson.isPractice = (levelId === 0);
            
            if (currentLesson.isPractice) {
                // 综合练习：从所有已解锁的字母中抽题
                let unlockedChars = [];
                levels.forEach(lvl => {
                    if (lvl.id < state.unlockedLevel) {
                        unlockedChars = unlockedChars.concat(lvl.chars);
                    }
                });
                // 防止极端情况下无题
                if (unlockedChars.length === 0) {
                    unlockedChars = ['E', 'T'];
                }
                currentLesson.charsPool = unlockedChars;
                currentLesson.learnedPool = [...unlockedChars]; // 综合练习的已学字符池为 unlockedChars
                currentLesson.maxHearts = 999; // 综合练习不扣心
                currentLesson.hearts = 999;
                currentLesson.phase = 'question'; // 直接开始，不显示关卡卡片预览
            } else {
                const lvl = levels.find(l => l.id === levelId);
                currentLesson.charsPool = lvl.chars;
                
                // 收集当前关卡及之前所有已学关卡的字符
                let learned = [];
                levels.forEach(l => {
                    if (l.id <= levelId) {
                        learned = learned.concat(l.chars);
                    }
                });
                currentLesson.learnedPool = learned;

                currentLesson.maxHearts = levelId <= 3 ? 5 : 3;
                currentLesson.hearts = currentLesson.maxHearts;
                currentLesson.phase = 'preview'; // 先进行预览
            }

            currentLesson.correctCount = 0;
            currentLesson.errorCount = 0;
            currentLesson.wrongAnswers.clear();

            // 生成10道题的队列
            generateQuestionsQueue();

            // 切换屏幕
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-status-bar').classList.add('hidden');
            document.getElementById('lesson-screen').classList.remove('hidden');

            updateLessonHeartsUI();
            updateProgressBar();

            if (currentLesson.phase === 'preview') {
                renderPreviewPhase();
            } else {
                nextQuestion();
            }
        }

        function generateQuestionsQueue() {
            currentLesson.queue = [];
            
            // 1. 首先，将本关卡的所有待学字符，强行各生成一道“char-to-morse”（输入摩斯码）题型
            // 并把它们打乱顺序后排在队列的最前头
            const mustMorseChars = shuffle([...currentLesson.charsPool]);
            mustMorseChars.forEach(targetChar => {
                currentLesson.queue.push({
                    type: 'char-to-morse',
                    target: targetChar,
                    morse: morseData[targetChar]
                });
            });

            // 2. 补齐剩下的题目至 10 道
            const remainingCount = Math.max(0, 10 - currentLesson.queue.length);
            
            // 题型列表。如果已学字符不足 4 个，剔除连线匹配题，避免选项无法凑齐
            let types = ['audio-to-char', 'char-to-morse', 'matching', 'translation'];
            if (currentLesson.learnedPool.length < 4) {
                types = ['audio-to-char', 'char-to-morse', 'translation'];
            }
            
            for (let i = 0; i < remainingCount; i++) {
                // 随机选一道题型
                let randType = types[Math.floor(Math.random() * types.length)];
                
                // 数字关卡（13、14关）不提供配对连线 and 听力发音（只考输入和翻译，防止音频数据解析错误）
                const isNumberLevel = currentLesson.charsPool.some(c => !isNaN(c));
                if (isNumberLevel) {
                    randType = Math.random() > 0.5 ? 'char-to-morse' : 'translation';
                }

                // 随机选择主测试字符
                const targetChar = currentLesson.charsPool[Math.floor(Math.random() * currentLesson.charsPool.length)];

                let q = {
                    type: randType,
                    target: targetChar,
                    morse: morseData[targetChar]
                };

                // 为选择题生成选项
                if (randType === 'audio-to-char') {
                    q.options = generateOptions(targetChar, 'char');
                } else if (randType === 'translation') {
                    q.options = generateOptions(targetChar, 'char');
                } else if (randType === 'matching') {
                    // 配对题：获取当前关卡字符 pool 并混淆
                    const pool = [...currentLesson.charsPool];
                    
                    // 优先从已学字符中补充其他字母以凑满 4 个
                    const learnedCandidates = currentLesson.learnedPool.filter(c => !pool.includes(c));
                    const shuffledLearned = shuffle([...learnedCandidates]);
                    for (let j = 0; j < shuffledLearned.length; j++) {
                        if (pool.length >= 4) break;
                        pool.push(shuffledLearned[j]);
                    }
                    
                    // 取前4个并打乱
                    const selected = pool.slice(0, 4);
                    q.leftItems = shuffle([...selected]);
                    q.rightItems = shuffle(selected.map(char => ({ char: char, morse: morseData[char] })));
                }

                currentLesson.queue.push(q);
            }

            currentLesson.totalOriginalCount = currentLesson.queue.length;
        }

        function generateOptions(target, mode) {
            const options = [target];
            const learnedCandidates = currentLesson.learnedPool.filter(c => c !== target);
            
            // 如果是单词，干扰项也应当全部为单词
            if (target.length > 1) {
                // 1. 优先从已学字符里的单词中选
                const learnedWords = learnedCandidates.filter(c => c.length > 1);
                const shuffledLearnedWords = shuffle([...learnedWords]);
                shuffledLearnedWords.forEach(w => {
                    if (options.length < 4) options.push(w);
                });
                
                // 2. 如果不足4个，使用全局预设的所有单词做兜底，保持极佳的挑战性与合理性
                if (options.length < 4) {
                    const allWords = ['SOS', 'OK', 'HI', 'THE', 'AND', 'YOU', 'HELLO', 'LOVE', 'BYE', 'CQ', '73', 'GL'];
                    const backups = shuffle(allWords.filter(w => w !== target && !options.includes(w)));
                    backups.forEach(w => {
                        if (options.length < 4) options.push(w);
                    });
                }
            } else {
                // 如果是单个字符，只从已解锁的单字符中提取干扰项，不进行任何全局兜底，确保早期关卡无混入
                const learnedChars = learnedCandidates.filter(c => c.length === 1);
                const shuffledLearned = shuffle([...learnedChars]);
                for (let i = 0; i < shuffledLearned.length; i++) {
                    if (options.length >= 4) break;
                    options.push(shuffledLearned[i]);
                }
            }
            
            // 终极安全补齐（防止极少元素导致的不够4项）
            if (options.length < 4) {
                const fallbackGroup = target.length > 1 ? ['SOS', 'OK', 'HI', 'CQ'] : ['E', 'T', 'I', 'M'];
                const secureBackups = shuffle(fallbackGroup.filter(b => b !== target && !options.includes(b)));
                secureBackups.forEach(b => {
                    if (options.length < 4) options.push(b);
                });
            }
            
            return shuffle(options);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function updateProgressBar() {
            const fill = document.getElementById('lesson-progress-fill');
            const percent = (currentLesson.correctCount / currentLesson.totalOriginalCount) * 100;
            fill.style.width = `${Math.min(percent, 100)}%`;
        }

        function updateLessonHeartsUI() {
            const count = document.getElementById('lesson-heart-count');
            const icon = document.getElementById('lesson-heart-icon');
            
            if (currentLesson.isPractice) {
                count.textContent = '∞';
                icon.textContent = '✨';
            } else {
                count.textContent = currentLesson.hearts;
                icon.textContent = '❤️';
            }
        }

        // ================= RENDERING: PREVIEW PHASE =================
        let previewIndex = 0; // 当前正在预览的字母索引

        function renderPreviewPhase() {
            previewIndex = 0;
            renderPreviewCard(previewIndex);
        }

        function renderPreviewCard(idx) {

                    <div class="preview-desc">仔细观察摩斯码点划如何契合字母笔画</div>
                    
                    <!-- 进度指示点 -->
                    <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 20px;">
                        ${dotsHtml}
                    </div>

                    <!-- 点划视觉徽章 -->
                    <div style="margin-bottom: 16px;">${getMorseVisualHtml(morseCode)}</div>

                    <!-- 记忆叠加层 -->
                    ${isSingleChar ? `
                    <div class="mnemonic-container" id="mnemonic-viewer" style="cursor: pointer;" onclick="playMorseSoundWithFlash('${char}')">

                    </div>
                    ` : `
                    <div style="font-size: 15px; color: var(--color-text-light); margin-bottom: 24px; padding: 20px; background: var(--color-bg-light); border-radius: 16px; text-align: center;">
                        <div style="font-size: 28px; margin-bottom: 8px;">📡</div>
                        点击下方按钮播放电报声音

                    <!-- 播放按钮 -->
                    <button class="audio-play-btn" onclick="playMorseSoundWithFlash('${char}')" title="播放电报声音" style="margin-bottom: 8px;">🔊</button>
                    <div style="font-size: 13px; color: var(--color-text-light); font-weight: 800;">点击播放发音</div>
                </div>

            // 设置底部按钮
            const actionBtn = document.getElementById('lesson-action-btn');
            if (isLast) {

                    nextQuestion();
                };
            } else {
                actionBtn.className = "duo-btn duo-btn-blue";
                actionBtn.innerHTML = `下一个字符 ➜`;

                    previewIndex++;
                    renderPreviewCard(previewIndex);
                };
            }

            // 自动播放发音和闪烁（延迟 400ms 让页面先渲染）

        // 定位公式与 morse_position_editor.html 完全一致，支持从 localStorage 动态加载
        function renderMnemonicSvg(char) {
            let config = null;
            const savedData = localStorage.getItem(`morse_pos_${char}`);
            if (savedData) {
                try {
                    config = JSON.parse(savedData);
                } catch(e) {
                    console.error("加载已保存位置失败", e);
                }
            }
            if (!config) {
                config = letterVisualConfigs[char];
            }

            if (!config) {
                // 如果没有视觉记忆图（比如数字、或者长度大于1的单词），自适应计算字号防止溢出
                let fontSize = 120;
                if (char.length > 1) {
                    fontSize = Math.max(32, 120 - (char.length * 12));
                }
                return `<div class="mnemonic-letter-bg" style="color: #f0f1f4; font-size: ${fontSize}px; letter-spacing: 4px; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8), -1px -1px 0px rgba(0, 0, 0, 0.03);">${char}</div>`;
            }

            let elementsHtml = '';
            config.forEach((el, idx) => {
                const halfWidth = el.type === 'dot' ? 15 : 15;
                const halfHeight = el.type === 'dot' ? 15 : 40;
                // 完全复制编辑器的 updateElementStyle 定位公式
                const style = `left: calc(${el.left}% - ${halfWidth}px); top: calc(${el.top}% - ${halfHeight}px); transform: rotate(${el.rotate || 0}deg);`;
                elementsHtml += `
                    <div class="m-element m-${el.type}" data-index="${idx}" style="${style}" onclick="playMorseUnitWithFlash('${el.type}', ${idx})"></div>
                `;
            });

            // 点划元素放在字母 div 内部作为子元素（与编辑器 letter-display 结构完全一致）
            // 这样百分比坐标就相对于字母文字自身宽高，而非外框容器
            return `
                <div class="mnemonic-letter-bg">${char}${elementsHtml}</div>
            `;
        }

        function playMorseSound(code) {
            morsePlayer.play(code, 1.0);
        }

        function playMorseUnit(type) {
            if (type === 'dot') {
                morsePlayer.play('.', 1.0);
            } else {
                morsePlayer.play('-', 1.0);
            }
        }

        // 音形结合：发音并同步闪烁点划元素
        function playMorseSoundWithFlash(char, speedMultiplier = 1.0) {
            playMorseSound(morseData[char]);
            flashMnemonicElements(char, speedMultiplier);
        }

        // 单音点击闪烁
        function playMorseUnitWithFlash(type, idx) {
            playMorseUnit(type);
            const elDom = document.querySelector(`.mnemonic-container [data-index="${idx}"]`);
            if (elDom) {
                elDom.classList.add('active-blink');
                setTimeout(() => {
                    elDom.classList.remove('active-blink');
                }, type === 'dot' ? 80 : 240);
            }
        }

        // 精准控制发光点划元素的高亮时间
        function flashMnemonicElements(char, speedMultiplier = 1.0) {
            let config = null;
            const savedData = localStorage.getItem(`morse_pos_${char}`);
            if (savedData) {
                try { config = JSON.parse(savedData); } catch(e){}
            }
            if (!config) {
                config = letterVisualConfigs[char];
            }
            if (!config) return;

            const baseUnit = 80 * speedMultiplier;
            const dotDuration = baseUnit;
            const dashDuration = baseUnit * 3;
            const intraGap = baseUnit;

            let delay = 50; // Web Audio 启动稍有 50ms 延时

            config.forEach((elConfig, idx) => {
                const duration = elConfig.type === 'dot' ? dotDuration : dashDuration;
                
                setTimeout(() => {
                    const elDom = document.querySelector(`.mnemonic-container [data-index="${idx}"]`);
                    if (elDom) {
                        elDom.classList.add('active-blink');
                        setTimeout(() => {
                            elDom.classList.remove('active-blink');
                        }, duration);
                    }
                }, delay);

                delay += duration + intraGap;
            });
        }

        // ================= RENDERING: QUESTIONS PHASE =================
        function nextQuestion() {
            // 重置状态
            currentLesson.selectedOption = null;
            currentLesson.morseInput = '';
            currentLesson.selectedMatchLeft = null;
            currentLesson.selectedMatchRight = null;
            currentLesson.pairedLeft.clear();
            currentLesson.pairedRight.clear();

            // 隐藏反馈栏，恢复底部按钮样式
            document.getElementById('feedback-row').style.display = 'none';
            const footer = document.getElementById('lesson-footer-panel');
            footer.className = "lesson-footer-panel";
            
            const actionBtn = document.getElementById('lesson-action-btn');
            actionBtn.className = "duo-btn duo-btn-gray duo-btn-disabled";
            actionBtn.innerHTML = "检查答案";
            actionBtn.onclick = null;

            if (currentLesson.queue.length === 0) {
                // 队列答完，进入结算
                finishLesson();
                return;
            }

            // 取出队首题目
            const q = currentLesson.queue[0];
            currentLesson.currentQuestion = q;

            // 渲染答题区域
            const area = document.getElementById('lesson-body-area');
            
            if (q.type === 'audio-to-char') {
                renderAudioToChar(area, q);
            } else if (q.type === 'char-to-morse') {
                renderCharToMorse(area, q);
            } else if (q.type === 'matching') {
                renderMatching(area, q);
            } else if (q.type === 'translation') {
                renderTranslation(area, q);
            }

            // 播放音频（如果是听力题，自动响一次）
            if (q.type === 'audio-to-char') {
                setTimeout(() => morsePlayer.play(q.morse, 1.0), 300);
            } else if (q.type === 'char-to-morse') {
                // 如果是输入摩斯码题，自动播放一次记忆卡片点划闪烁和对应音频
                setTimeout(() => playMorseSoundWithFlash(q.target), 400);
            }
        }

        // --- 题型 2: 输入摩斯码 ---
