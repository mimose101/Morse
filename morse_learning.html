<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>摩斯密码学习应用</title>
    <!-- 引入高质感现代 Google 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="morse_learning.css?v=2.0">
    <style id="safe-area-insets-detection"></style>
</head>
<body>

    <div class="app-container">

        <!-- 顶部导航状态栏 (只在 Home 界面及结果界面生效，学习界面有独立顶部栏) -->
        <div class="top-status-bar" id="app-status-bar">
            <button class="back-home-btn" id="status-bar-back-btn" onclick="showScreen('welcome-screen')" style="margin-right: 8px; width: 36px; height: 36px; border-radius: 10px; font-size: 16px; display: none; align-items: center; justify-content: center; padding: 0;">🏠</button>
            <div class="status-item status-streak" title="连续学习天数">
                <span class="status-icon">🔥</span>
                <span id="streak-val">0</span>
            </div>
            <div class="status-item status-xp" title="经验值">
                <span class="status-icon">✨</span>
                <span id="xp-val" class="xp-display-glow">0</span>
            </div>
            <div class="status-item status-heart" title="生命值">
                <span class="status-icon">❤️</span>
                <span id="hearts-val">5</span>
            </div>
        </div>

        <!-- ================= SCREEN: WELCOME (PORTAL) ================= -->
        <div id="welcome-screen">
            <div class="welcome-hero-container">
                <div class="telegraph-machine">
                    <div class="telegraph-base"></div>
                    <div class="telegraph-arm">
                        <div class="telegraph-knob"></div>
                    </div>
                    <div class="telegraph-ripple"></div>
                </div>
            </div>
            
            <h1 class="welcome-title">摩斯密码训练营</h1>
            <p class="welcome-subtitle">趣味闯关，快速掌握摩斯电码</p>
            
            <div class="welcome-user-preview" onclick="showScreen('profile-screen')">
                <div class="user-preview-avatar" id="welcome-avatar">🦉</div>
                <div class="user-preview-info">
                    <div class="user-preview-name" id="welcome-username">极客学员</div>
                    <div class="user-preview-stats">累计经验：<span id="welcome-xp">0</span> XP</div>
                </div>
                <div class="user-preview-arrow">➔</div>
            </div>
            
            <div class="welcome-buttons">
                <button class="duo-btn duo-btn-green" onclick="showScreen('home-screen')">
                    🚀 开始学习之旅
                </button>
                <button class="duo-btn duo-btn-blue" onclick="showScreen('codebook-screen')">
                    📖 查阅密码本
                </button>
                <button class="duo-btn duo-btn-yellow" onclick="showScreen('profile-screen')">
                    👤 个人档案与成就
                </button>
            </div>
        </div>

        <!-- ================= SCREEN: CODEBOOK ================= -->
        <div id="codebook-screen" class="hidden">
            <div class="codebook-header">
                <button class="back-home-btn" onclick="showScreen('welcome-screen')" style="display: flex; align-items: center; justify-content: center; padding: 0;">🏠</button>
                <div class="codebook-title">摩斯密码本</div>
            </div>
            
            <div class="codebook-search-container">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="codebook-search-input" placeholder="输入英文字母、数字或摩斯码..." oninput="filterCodebook()">
                    <button class="search-clear-btn hidden" id="search-clear-btn" onclick="clearSearchInput()">✖</button>
                </div>
                
                <div class="codebook-tabs">
                    <button class="codebook-tab active" onclick="switchCodebookTab('all', this)">全部</button>
                    <button class="codebook-tab" onclick="switchCodebookTab('letter', this)">字母</button>
                    <button class="codebook-tab" onclick="switchCodebookTab('number', this)">数字</button>
                    <button class="codebook-tab" onclick="switchCodebookTab('word', this)">常用词</button>
                </div>
            </div>
            
            <div class="codebook-grid-container">
                <div class="codebook-grid" id="codebook-grid-items">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- ================= SCREEN: PROFILE ================= -->
        <div id="profile-screen" class="hidden">
            <div class="profile-header">
                <button class="back-home-btn" onclick="showScreen('welcome-screen')" style="display: flex; align-items: center; justify-content: center; padding: 0;">🏠</button>
                <div class="profile-title">个人档案</div>
            </div>
            
            <div class="profile-user-card">
                <div class="profile-avatar-container" onclick="openAvatarSelector()">
                    <div class="profile-avatar" id="profile-avatar-display">🦉</div>
                    <div class="avatar-edit-badge">✎</div>
                </div>
                <div class="profile-username-container">
                    <div class="profile-name-row" id="username-display-row">
                        <span class="profile-name" id="profile-username-val">极客学员</span>
                        <button class="username-edit-btn" onclick="startEditUsername()">✎</button>
                    </div>
                    <div class="profile-name-edit-row hidden" id="username-edit-row">
                        <input type="text" id="username-edit-input" maxlength="12" onkeydown="handleUsernameKeydown(event)">
                        <button class="username-save-btn" onclick="saveEditedUsername()">✓</button>
                        <button class="username-cancel-btn" onclick="cancelEditUsername()">✗</button>
                    </div>
                    <div class="profile-join-date">⏱ <span id="profile-join-date-val">2026-06-18</span> 加入训练营</div>
                </div>
            </div>
            
            <div class="profile-stats-title">学习数据统计</div>
            <div class="profile-stats-grid">
                <div class="profile-stat-card">
                    <div class="stat-icon">✨</div>
                    <div class="stat-value" id="profile-stat-xp">0</div>
                    <div class="stat-label">累计经验</div>
                </div>
                <div class="profile-stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="profile-stat-streak">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="profile-stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-value" id="profile-stat-max-streak">0</div>
                    <div class="stat-label">最高连击</div>
                </div>
                <div class="profile-stat-card">
                    <div class="stat-icon">👑</div>
                    <div class="stat-value" id="profile-stat-perfect">0</div>
                    <div class="stat-label">完美通关</div>
                </div>
                <div class="profile-stat-card" style="grid-column: span 2; display: flex; flex-direction: row; align-items: center; justify-content: space-between;">
                    <div style="display: flex; flex-direction: column; align-items: flex-start; flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 4px;">
                            <select id="profile-level-select" onchange="changeUnlockedLevel(this.value)" style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; color: var(--color-text-dark); border: 2px solid var(--color-gray-border); border-radius: 12px; padding: 6px 12px; outline: none; background-color: var(--color-bg-light); cursor: pointer; width: 140px;">
                                <!-- 动态生成选项 -->
                            </select>
                        </div>
                        <div class="stat-label">自定义解锁进度</div>
                    </div>
                    <div class="stat-icon" style="position: static; font-size: 24px;">🗺️</div>
                </div>
            </div>
            
            <div class="profile-badges-title">成就徽章</div>
            <div class="profile-badges-container" id="profile-badges-items">
                <!-- 动态生成 -->
            </div>
            
            <div class="profile-actions-container">
                <button class="duo-btn duo-btn-blue" onclick="openUserSwitcherModal()" style="width: 100%;">
                    👥 切换用户 / 存档管理
                </button>
            </div>
        </div>

        <!-- ================= SCREEN: HOME ================= -->
        <div id="home-screen" class="hidden">
            <div class="map-title">摩斯密码学习地图</div>
            
            <div class="level-map-container" id="level-map-container">
                <!-- SVG连接线 -->
                <svg class="level-map-svg" id="map-svg">
                    <path id="map-path" d="" fill="none" stroke="#E5E5E5" stroke-width="8" stroke-dasharray="12 8" stroke-linecap="round" />
                </svg>

                <div class="level-nodes-wrapper" id="level-nodes-wrapper">
                    <!-- 关卡球由 JS 动态生成并挂载在这里 -->
                </div>
            </div>

            <div class="home-footer">
                <button class="duo-btn duo-btn-blue duo-btn-disabled" id="practice-all-btn">
                    🔒 通关第1关解锁综合练习
                </button>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <button class="duo-btn duo-btn-gray" onclick="showResetConfirmModal()" style="width: 100%; font-size: 14px; padding: 12px 10px;">
                        ⚠️ 重置数据
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= SCREEN: LESSON ================= -->
        <div id="lesson-screen" class="hidden">
            <div class="lesson-header">
                <button class="close-btn" onclick="confirmExitLesson()">✖</button>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="lesson-progress-fill"></div>
                </div>
                <div class="lesson-hearts" id="lesson-hearts-container">
                    <span id="lesson-heart-icon">❤️</span>
                    <span id="lesson-heart-count">5</span>
                </div>
            </div>

            <div class="lesson-body" id="lesson-body-area">
                <!-- 学习卡片或题目卡片在此动态替换 -->
            </div>

            <!-- 反馈/动作底部栏 -->
            <div class="lesson-footer-panel" id="lesson-footer-panel">
                <!-- 答对/答错反馈区 -->
                <div class="feedback-row" id="feedback-row">
                    <div class="feedback-icon-container" id="feedback-icon">✓</div>
                    <div class="feedback-text-container">
                        <div class="feedback-title" id="feedback-title">非常好！</div>
                        <div class="feedback-message" id="feedback-message">正确答案是：E</div>
                    </div>
                </div>
                <!-- 行为按钮 -->
                <button class="duo-btn duo-btn-green" id="lesson-action-btn" onclick="handleFooterAction()">检查答案</button>
            </div>
        </div>

        <!-- ================= SCREEN: RESULT ================= -->
        <div id="result-screen" class="hidden">
            <div class="canvas-container">
                <canvas id="confetti-canvas"></canvas>
            </div>

            <div class="stars-container" id="result-stars">
                <span class="result-star">★</span>
                <span class="result-star">★</span>
                <span class="result-star">★</span>
            </div>

            <div class="result-title" id="result-main-title">关卡通过！</div>
            
            <div class="result-stats-row">
                <div class="result-stat-card">
                    <div class="stat-card-title">获得经验</div>
                    <div class="stat-card-value xp-gain" id="result-xp-gain">+15 XP</div>
                </div>
                <div class="result-stat-card">
                    <div class="stat-card-title">正确率</div>
                    <div class="stat-card-value" id="result-accuracy">100%</div>
                </div>
            </div>

            <button class="duo-btn duo-btn-green" style="width: 80%;" onclick="exitResultToHome()">继续</button>
        </div>

        <!-- ================= MODAL CONTAINERS ================= -->
        <div id="modal-container" class="modal-mask hidden">
            <!-- 模态框内容由 JS 替换 -->
        </div>

    </div>

    <script src="morse_data.js?v=2.0"></script>
    <script src="morse_player.js?v=2.0"></script>
    <script src="morse_main.js?v=2.0"></script>
</body>
</html>
