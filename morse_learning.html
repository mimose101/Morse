<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多邻国风格摩斯密码学习应用</title>
    <!-- 引入高质感现代 Google 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-green: #58CC02;
            --color-green-dark: #46A302;
            --color-blue: #1CB0F6;
            --color-blue-dark: #1899D6;
            --color-yellow: #FFC800;
            --color-yellow-dark: #E6B400;
            --color-red: #FF4B4B;
            --color-red-dark: #EA2B2B;
            --color-gray-border: #E5E5E5;
            --color-text-dark: #3C3C3C;
            --color-text-light: #AFAFAF;
            --color-bg-light: #F7F7F7;
            --color-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--color-bg-light);
            color: var(--color-text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow-x: hidden;
        }

        /* 应用主体，限制最大宽度以适配手机和桌面居中 */
        .app-container {
            width: 100%;
            max-width: 540px;
            background-color: var(--color-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* 隐藏元素的类 */
        .hidden {
            display: none !important;
        }

        /* 立体按钮 */
        .duo-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .duo-btn-green {
            background-color: var(--color-green);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-green-dark);
        }

        .duo-btn-green:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-green-dark);
        }

        .duo-btn-blue {
            background-color: var(--color-blue);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-blue-dark);
        }

        .duo-btn-blue:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-blue-dark);
        }

        .duo-btn-yellow {
            background-color: var(--color-yellow);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-yellow-dark);
        }

        .duo-btn-yellow:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-yellow-dark);
        }

        .duo-btn-red {
            background-color: var(--color-red);
            color: var(--color-white);
            box-shadow: 0 4px 0 var(--color-red-dark);
        }

        .duo-btn-red:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-red-dark);
        }

        .duo-btn-gray {
            background-color: var(--color-white);
            color: var(--color-text-light);
            border: 2px solid var(--color-gray-border);
            box-shadow: 0 4px 0 var(--color-gray-border);
        }

        .duo-btn-gray:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .duo-btn-disabled {
            background-color: #E5E5E5 !important;
            color: #AFAFAF !important;
            box-shadow: 0 4px 0 #CCCCCC !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 顶部导航状态栏 */
        .top-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 800;
        }

        .status-icon {
            font-size: 20px;
        }

        .status-streak { color: #FF9600; }
        .status-xp { color: var(--color-yellow); }
        .status-heart { color: var(--color-red); }

        /* ================= SCREEN: HOME ================= */
        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 40px;
        }

        .map-title {
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            margin: 24px 0 10px 0;
            color: var(--color-text-dark);
        }

        /* 蜿蜒关卡地图容器 */
        .level-map-container {
            flex: 1;
            position: relative;
            margin: 20px 0;
            padding: 0 40px;
            min-height: 850px;
        }

        .level-map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .level-nodes-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .level-node-row {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* 关卡球样式 */
        .level-circle {
            width: 70px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--color-white);
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .level-circle.locked {
            background-color: #E5E5E5;
            box-shadow: 0 6px 0 #BDBDBD;
            color: #AFAFAF;
            cursor: not-allowed;
        }

        .level-circle.unlocked {
            background-color: var(--color-green);
            box-shadow: 0 8px 0 var(--color-green-dark);
        }

        .level-circle.unlocked:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--color-green-dark);
        }

        .level-circle.completed {
            background-color: var(--color-yellow);
            box-shadow: 0 8px 0 var(--color-yellow-dark);
        }

        .level-circle.completed:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--color-yellow-dark);
        }

        .level-circle.unlocked.active-level::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 3px dashed var(--color-green);
            animation: rotate-outline 8s linear infinite;
        }

        @keyframes rotate-outline {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 悬浮提示框 (类似于多邻国的小卡片) */
        .level-tooltip {
            position: absolute;
            background-color: var(--color-text-dark);
            color: var(--color-white);
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 10;
        }

        .level-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--color-text-dark) transparent transparent transparent;
        }

        .level-circle:hover .level-tooltip {
            opacity: 1;
            transform: translate(-50%, -5px);
        }

        /* 底部操作区 */
        .home-footer {
            padding: 10px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        /* ================= SCREEN: LESSON ================= */
        #lesson-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .lesson-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            gap: 16px;
            border-bottom: 2px solid var(--color-gray-border);
        }

        .close-btn {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-text-light);
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
        }

        .close-btn:hover {
            color: var(--color-text-dark);
        }

        /* 进度条 */
        .progress-bar-container {
            flex: 1;
            height: 16px;
            background-color: var(--color-gray-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--color-green);
            border-radius: 8px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 进度条内反光效果 */
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 5px;
            right: 5px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 1.5px;
        }

        .lesson-hearts {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 800;
            color: var(--color-red);
        }

        .lesson-body {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* ================= SUB-PHASE: PREVIEW ================= */
        .preview-phase {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
        }

        .preview-desc {
            font-size: 15px;
            color: var(--color-text-light);
            margin-bottom: 24px;
            text-align: center;
        }

        .preview-cards-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            margin-bottom: 30px;
        }

        .preview-card {
            background: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 20px;
            width: 150px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--color-gray-border);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .preview-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .preview-card-char {
            font-size: 40px;
            font-weight: 800;
            color: var(--color-text-dark);
            margin-bottom: 8px;
        }

        .preview-card-morse {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-blue);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .play-preview-icon {
            width: 44px;
            height: 44px;
            background-color: rgba(28, 176, 246, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-blue);
            font-size: 18px;
        }

        .preview-card:hover .play-preview-icon {
            background-color: var(--color-blue);
            color: var(--color-white);
        }

        /* Mnemonic Overlay Container */
        .mnemonic-container {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ffffff 0%, #f5f6f8 100%);
            border: 2px solid #eaeaea;
            border-radius: 28px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), inset 0 2px 5px rgba(255, 255, 255, 0.6);
        }

        .mnemonic-letter-bg {
            font-family: 'Roboto', 'Arial Black', sans-serif;
            font-size: 200px;
            font-weight: 900;
            color: #f0f1f4;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8), -1px -1px 0px rgba(0, 0, 0, 0.03);
            line-height: 1;
            z-index: 1;
            /* 关键：让子元素（点划）的百分比坐标相对于字母文字本身，与编辑器一致 */
            position: relative;
        }

        .m-element {
            position: absolute;
            background: linear-gradient(135deg, #4d4d4d 0%, #222222 100%);
            border: 2px solid var(--color-white);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15), 0 8px 16px rgba(0, 0, 0, 0.08);
            z-index: 2;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .m-element:hover {
            background: linear-gradient(135deg, #28b8f8 0%, #0087d1 100%);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12), 0 12px 20px rgba(28, 176, 246, 0.2);
        }

        .m-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .m-dash {
            width: 30px;
            height: 80px;
            border-radius: 12px;
        }

        /* 闪烁状态的亮绿色发光样式 */
        .m-element.active-blink {
            background: linear-gradient(135deg, #7be11a 0%, #58cc02 100%) !important;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.8), 0 4px 0 #46a302 !important;
            border-color: var(--color-white) !important;
            transform: scale(1.05);
        }

        /* ================= SCREEN: LESSON CARD PHASES ================= */
        .lesson-question-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex: 1;
        }

        .question-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--color-text-dark);
            text-align: left;
            width: 100%;
        }

        /* 题型 1: 听音辨字 */
        .audio-buttons-row {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .audio-play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--color-blue);
            border: none;
            color: var(--color-white);
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--color-blue-dark);
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .audio-play-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--color-blue-dark);
        }



        /* 多选一网格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .option-card {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 20px;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--color-gray-border);
            transition: all 0.1s ease;
            position: relative;
        }

        .option-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .option-card.selected {
            border-color: #84D8FF;
            background-color: #E1F5FE;
            box-shadow: 0 4px 0 #84D8FF;
            color: #0079C1;
        }

        .option-card.selected:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #84D8FF;
        }

        .option-shortcut {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 11px;
            color: var(--color-text-light);
            border: 1px solid var(--color-gray-border);
            border-radius: 4px;
            padding: 1px 4px;
        }

        /* 题型 2: 输入摩斯码 */
        .input-code-display {
            min-height: 72px;
            background-color: var(--color-bg-light);
            border: 2px solid var(--color-gray-border);
            border-radius: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
            padding: 12px 24px;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.03);
        }

        .input-code-display.has-content {
            background-color: var(--color-white);
            border-color: var(--color-blue);
            box-shadow: 0 0 0 4px rgba(28, 176, 246, 0.15), inset 0 1px 2px rgba(0, 0, 0, 0.01);
        }

        .display-placeholder {
            font-size: 16px;
            font-weight: 800;
            color: var(--color-text-light);
            letter-spacing: 0.5px;
        }

        .morse-input-panel {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .morse-input-btn, .morse-backspace-btn {
            flex: 1;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            padding: 8px 0;
            max-width: 130px;
        }

        .morse-input-btn .btn-symbol, .morse-backspace-btn .btn-symbol {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .morse-backspace-btn .btn-symbol {
            font-size: 24px;
            font-weight: 800;
        }

        .btn-label {
            font-size: 12px;
            font-weight: 800;
            opacity: 0.85;
            letter-spacing: 0.5px;
        }

        .duo-btn-blue .btn-label {
            color: rgba(255, 255, 255, 0.9);
        }

        .duo-btn-gray .btn-label {
            color: var(--color-text-light);
        }

        .keyboard-hint {
            font-size: 13px;
            color: var(--color-text-light);
            margin-top: 8px;
            text-align: center;
        }

        /* 题型 3: 配对连线 */
        .matching-columns {
            display: flex;
            width: 100%;
            gap: 20px;
            justify-content: space-between;
        }

        .matching-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background-color: var(--color-white);
            border: 2px solid var(--color-gray-border);
            border-radius: 12px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--color-gray-border);
            transition: all 0.1s ease;
        }

        .match-card:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 var(--color-gray-border);
        }

        .match-card.selected {
            border-color: #84D8FF;
            background-color: #E1F5FE;
            box-shadow: 0 3px 0 #84D8FF;
            color: #0079C1;
        }

        .match-card.selected:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #84D8FF;
        }

        .match-card.paired {
            border-color: #B2FF59 !important;
            background-color: #F1F8E9 !important;
            color: #558B2F !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.8;
        }

        .match-card.error-blink {
            border-color: #FF8A80;
            background-color: #FFEBEE;
            box-shadow: 0 3px 0 #FF8A80;
            color: #C62828;
            animation: shake 0.2s linear infinite;
        }

        /* CSS Shake 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* 题型 4: 翻译识别 */
        .translation-input-box {
            width: 100%;
            height: 80px;
            border: 2px solid var(--color-gray-border);
            border-radius: 16px;
            padding: 16px;
            font-size: 20px;
            font-weight: 800;
            color: var(--color-text-dark);
            outline: none;
            resize: none;
            margin-bottom: 20px;
            text-align: center;
        }

        .translation-input-box:focus {
            border-color: var(--color-blue);
        }

        /* ================= FOOTER CONTROL PANEL (DUOLINGO FEEDBACK) ================= */
        .lesson-footer-panel {
            padding: 24px;
            border-top: 2px solid var(--color-gray-border);
            background-color: var(--color-white);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: background-color 0.2s ease;
        }

        .feedback-row {
            display: flex;
            align-items: center;
            gap: 16px;
            display: none;
        }

        .feedback-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .feedback-text-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 800;
        }

        .feedback-message {
            font-size: 14px;
            font-weight: 600;
        }

        // ================= WEB AUDIO PLAYER =================
        class MorsePlayer {
            constructor() {
                this.audioCtx = null;
                this.frequency = 680;
                this.oscillator = null;
                this.gainNode = null;
            }

            init() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }
            }

            play(morseCode, speedMultiplier = 1.0) {
                this.init();
                this.stop();

                const baseUnit = 80 * speedMultiplier; // ms
                const dotDuration = baseUnit / 1000;
                const dashDuration = (baseUnit * 3) / 1000;
                const intraGap = baseUnit / 1000;

                let time = this.audioCtx.currentTime + 0.05;

                this.oscillator = this.audioCtx.createOscillator();
                this.gainNode = this.audioCtx.createGain();

                this.oscillator.type = 'sine';
                this.oscillator.frequency.value = this.frequency;
                
                // 初始静音
                this.gainNode.gain.setValueAtTime(0, this.audioCtx.currentTime);

                for (let i = 0; i < morseCode.length; i++) {
                    const char = morseCode[i];
                    if (char === '.' || char === '-') {
                        const duration = (char === '.') ? dotDuration : dashDuration;
                        
                        // 线性渐变淡入淡出，消除切换卡嗒声
                        this.gainNode.gain.setValueAtTime(0, time);
                        this.gainNode.gain.linearRampToValueAtTime(0.8, time + 0.005);
                        this.gainNode.gain.setValueAtTime(0.8, time + duration - 0.005);
                        this.gainNode.gain.linearRampToValueAtTime(0, time + duration);

                        time += duration + intraGap;
                    }
                }

                this.oscillator.connect(this.gainNode);
                this.gainNode.connect(this.audioCtx.destination);

                this.oscillator.start();
                this.oscillator.stop(time);
            }

            stop() {
                if (this.oscillator) {
                    try {
                        this.oscillator.stop();
                    } catch(e) {}
                    this.oscillator.disconnect();
                    this.oscillator = null;
                }
            }

            playFeedbackSound(isCorrect) {
                this.init();
                const now = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                if (isCorrect) {
                    // 答对：欢快的双音（880Hz -> 1174Hz）
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1174, now + 0.08);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.4, now + 0.01);
                    gain.gain.setValueAtTime(0.4, now + 0.18);
                    gain.gain.linearRampToValueAtTime(0, now + 0.22);
                    
                    osc.start(now);
                    osc.stop(now + 0.22);
                } else {
                    // 答错：低频的降调蜂鸣（220Hz）
                    osc.frequency.setValueAtTime(220, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.5, now + 0.01);
                    gain.gain.setValueAtTime(0.5, now + 0.25);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    
                    osc.start(now);
                    osc.stop(now + 0.3);
                }
            }
        }

        }

        // ================= RENDERING: LEVEL MAP =================
        function renderLevelMap() {
            const wrapper = document.getElementById('level-nodes-wrapper');

            const steps = levels.length;
            const nodes = [];

                // 使用正弦曲线计算横向偏移，形成流畅蛇形蜿蜒

                    circle.classList.add('unlocked', 'active-level');
                    circle.innerHTML = lvl.id;
                } else {
                    circle.classList.add('locked');
                    circle.innerHTML = '🔒';
                }

                // 悬浮泡泡

                tooltip.className = 'level-tooltip';

                circle.appendChild(tooltip);

                // 点击进入关卡
                circle.onclick = () => {
                    if (lvl.id <= state.unlockedLevel) {
                        startLesson(lvl.id);
                    }
                };

                circle.style.transform = `translateX(${xOffset}px)`;
                nodeRow.appendChild(circle);
                wrapper.appendChild(nodeRow);

                // 缓存中心点位置以便绘制连接SVG虚线
                nodes.push({ x: xOffset, id: lvl.id });
            });

            // 绘制SVG连接折线
            setTimeout(() => {
                const svg = document.getElementById('map-svg');
                const path = document.getElementById('map-path');
                const circles = document.querySelectorAll('.level-circle');
                
                if (circles.length === 0) return;

                const containerRect = document.getElementById('level-map-container').getBoundingClientRect();
                let pathD = '';

                circles.forEach((c, idx) => {
                    const r = c.getBoundingClientRect();
                    const cx = (r.left + r.right) / 2 - containerRect.left;
                    const cy = (r.top + r.bottom) / 2 - containerRect.top;

                    if (idx === 0) {
                        pathD += `M ${cx} ${cy}`;
                    } else {
                        // 使用贝塞尔曲线使连线圆润平滑
                        const prevR = circles[idx - 1].getBoundingClientRect();
                        const prevCx = (prevR.left + prevR.right) / 2 - containerRect.left;
                        const prevCy = (prevR.top + prevR.bottom) / 2 - containerRect.top;
                        const midY = (prevCy + cy) / 2;
                        pathD += ` C ${prevCx} ${midY}, ${cx} ${midY}, ${cx} ${cy}`;
                    }
                });

                path.setAttribute('d', pathD);
            }, 100);
        }

        // ================= LESSON ENGINE =================
        function startLesson(levelId) {
            morsePlayer.init(); // 允许音频环境激活

            currentLesson.id = levelId;
            currentLesson.isPractice = (levelId === 0);
            
            if (currentLesson.isPractice) {
                // 综合练习：从所有已解锁的字母中抽题
                let unlockedChars = [];
                levels.forEach(lvl => {
                    if (lvl.id < state.unlockedLevel) {
                        unlockedChars = unlockedChars.concat(lvl.chars);
                    }
                });
                // 防止极端情况下无题
                if (unlockedChars.length === 0) {
                    unlockedChars = ['E', 'T'];
                }
                currentLesson.charsPool = unlockedChars;
                currentLesson.learnedPool = [...unlockedChars]; // 综合练习的已学字符池为 unlockedChars
                currentLesson.maxHearts = 999; // 综合练习不扣心
                currentLesson.hearts = 999;
                currentLesson.phase = 'question'; // 直接开始，不显示关卡卡片预览
            } else {
                const lvl = levels.find(l => l.id === levelId);
                currentLesson.charsPool = lvl.chars;
                
                // 收集当前关卡及之前所有已学关卡的字符
                let learned = [];
                levels.forEach(l => {
                    if (l.id <= levelId) {
                        learned = learned.concat(l.chars);
                    }
                });
                currentLesson.learnedPool = learned;

                currentLesson.maxHearts = levelId <= 3 ? 5 : 3;
                currentLesson.hearts = currentLesson.maxHearts;
                currentLesson.phase = 'preview'; // 先进行预览
            }

            currentLesson.correctCount = 0;
            currentLesson.errorCount = 0;
            currentLesson.wrongAnswers.clear();

            // 生成10道题的队列
            generateQuestionsQueue();

            // 切换屏幕
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-status-bar').classList.add('hidden');
            document.getElementById('lesson-screen').classList.remove('hidden');

            updateLessonHeartsUI();
            updateProgressBar();

            if (currentLesson.phase === 'preview') {
                renderPreviewPhase();
            } else {
                nextQuestion();
            }
        }

        function generateQuestionsQueue() {
            currentLesson.queue = [];
            
            // 1. 首先，将本关卡的所有待学字符，强行各生成一道“char-to-morse”（输入摩斯码）题型
            // 并把它们打乱顺序后排在队列的最前头
            const mustMorseChars = shuffle([...currentLesson.charsPool]);
            mustMorseChars.forEach(targetChar => {
                currentLesson.queue.push({
                    type: 'char-to-morse',
                    target: targetChar,
                    morse: morseData[targetChar]
                });
            });

            // 2. 补齐剩下的题目至 10 道
            const remainingCount = Math.max(0, 10 - currentLesson.queue.length);
            
            // 题型列表。如果已学字符不足 4 个，剔除连线匹配题，避免选项无法凑齐
            let types = ['audio-to-char', 'char-to-morse', 'matching', 'translation'];
            if (currentLesson.learnedPool.length < 4) {
                types = ['audio-to-char', 'char-to-morse', 'translation'];
            }
            
            for (let i = 0; i < remainingCount; i++) {
                // 随机选一道题型
                let randType = types[Math.floor(Math.random() * types.length)];
                
                // 数字关卡（13、14关）不提供配对连线 and 听力发音（只考输入和翻译，防止音频数据解析错误）
                const isNumberLevel = currentLesson.charsPool.some(c => !isNaN(c));
                if (isNumberLevel) {
                    randType = Math.random() > 0.5 ? 'char-to-morse' : 'translation';
                }

                // 随机选择主测试字符
                const targetChar = currentLesson.charsPool[Math.floor(Math.random() * currentLesson.charsPool.length)];

                let q = {
                    type: randType,
                    target: targetChar,
                    morse: morseData[targetChar]
                };

                // 为选择题生成选项
                if (randType === 'audio-to-char') {
                    q.options = generateOptions(targetChar, 'char');
                } else if (randType === 'translation') {
                    q.options = generateOptions(targetChar, 'char');
                } else if (randType === 'matching') {
                    // 配对题：获取当前关卡字符 pool 并混淆
                    const pool = [...currentLesson.charsPool];
                    
                    // 优先从已学字符中补充其他字母以凑满 4 个
                    const learnedCandidates = currentLesson.learnedPool.filter(c => !pool.includes(c));
                    const shuffledLearned = shuffle([...learnedCandidates]);
                    for (let j = 0; j < shuffledLearned.length; j++) {
                        if (pool.length >= 4) break;
                        pool.push(shuffledLearned[j]);
                    }
                    
                    // 取前4个并打乱
                    const selected = pool.slice(0, 4);
                    q.leftItems = shuffle([...selected]);
                    q.rightItems = shuffle(selected.map(char => ({ char: char, morse: morseData[char] })));
                }

                currentLesson.queue.push(q);
            }

            currentLesson.totalOriginalCount = currentLesson.queue.length;
        }

        function generateOptions(target, mode) {
            const options = [target];
            
            // 严格只从已学字符中选择干扰项，不进行全局补充
            const learnedCandidates = currentLesson.learnedPool.filter(c => c !== target);
            const shuffledLearned = shuffle([...learnedCandidates]);
            for (let i = 0; i < shuffledLearned.length; i++) {
                if (options.length >= 4) break;
                options.push(shuffledLearned[i]);
            }
            
            return shuffle(options);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 定位公式与 morse_position_editor.html 完全一致，支持从 localStorage 动态加载
        function renderMnemonicSvg(char) {
            let config = null;
            const savedData = localStorage.getItem(`morse_pos_${char}`);
            if (savedData) {
                try {
                    config = JSON.parse(savedData);
                } catch(e) {
                    console.error("加载已保存位置失败", e);
                }
            }
            if (!config) {
                config = letterVisualConfigs[char];
            }

            if (!config) {
                // 如果没有视觉记忆图（比如数字），显示大号普通文本
                return `<div class="mnemonic-letter-bg" style="color: #AFAFAF;">${char}</div>`;
            }

            let elementsHtml = '';
            config.forEach((el, idx) => {
                const halfWidth = el.type === 'dot' ? 15 : 15;
                const halfHeight = el.type === 'dot' ? 15 : 40;
                // 完全复制编辑器的 updateElementStyle 定位公式
                const style = `left: calc(${el.left}% - ${halfWidth}px); top: calc(${el.top}% - ${halfHeight}px); transform: rotate(${el.rotate || 0}deg);`;
                elementsHtml += `
                    <div class="m-element m-${el.type}" data-index="${idx}" style="${style}" onclick="playMorseUnitWithFlash('${el.type}', ${idx})"></div>
                `;
            });

            // 点划元素放在字母 div 内部作为子元素（与编辑器 letter-display 结构完全一致）
            // 这样百分比坐标就相对于字母文字自身宽高，而非外框容器
            return `
                <div class="mnemonic-letter-bg">${char}${elementsHtml}</div>
            `;
        }

        function playMorseSound(code) {
            morsePlayer.play(code, 1.0);
        }

        function playMorseUnit(type) {
            if (type === 'dot') {
                morsePlayer.play('.', 1.0);
            } else {
                morsePlayer.play('-', 1.0);
            }
        }

        // 音形结合：发音并同步闪烁点划元素
        function playMorseSoundWithFlash(char, speedMultiplier = 1.0) {
            playMorseSound(morseData[char]);
            flashMnemonicElements(char, speedMultiplier);
        }

        // 单音点击闪烁
        function playMorseUnitWithFlash(type, idx) {
            playMorseUnit(type);
            const elDom = document.querySelector(`.mnemonic-container [data-index="${idx}"]`);
            if (elDom) {
                elDom.classList.add('active-blink');
                setTimeout(() => {
                    elDom.classList.remove('active-blink');
                }, type === 'dot' ? 80 : 240);
            }
        }

        // 精准控制发光点划元素的高亮时间
        function flashMnemonicElements(char, speedMultiplier = 1.0) {
            let config = null;
            const savedData = localStorage.getItem(`morse_pos_${char}`);
            if (savedData) {
                try { config = JSON.parse(savedData); } catch(e){}
            }
            if (!config) {
                config = letterVisualConfigs[char];
            }
            if (!config) return;

            const baseUnit = 80 * speedMultiplier;
            const dotDuration = baseUnit;
            const dashDuration = baseUnit * 3;
            const intraGap = baseUnit;

            let delay = 50; // Web Audio 启动稍有 50ms 延时

            config.forEach((elConfig, idx) => {
                const duration = elConfig.type === 'dot' ? dotDuration : dashDuration;
                
                setTimeout(() => {
                    const elDom = document.querySelector(`.mnemonic-container [data-index="${idx}"]`);
                    if (elDom) {
                        elDom.classList.add('active-blink');
                        setTimeout(() => {
                            elDom.classList.remove('active-blink');
                        }, duration);
                    }
                }, delay);

                delay += duration + intraGap;
            });
        }

        // ================= RENDERING: QUESTIONS PHASE =================
        function nextQuestion() {
            // 重置状态
            currentLesson.selectedOption = null;
            currentLesson.morseInput = '';
            currentLesson.selectedMatchLeft = null;
            currentLesson.selectedMatchRight = null;
            currentLesson.pairedLeft.clear();
            currentLesson.pairedRight.clear();

            // 隐藏反馈栏，恢复底部按钮样式
            document.getElementById('feedback-row').style.display = 'none';
            const footer = document.getElementById('lesson-footer-panel');
            footer.className = "lesson-footer-panel";
            
            const actionBtn = document.getElementById('lesson-action-btn');
            actionBtn.className = "duo-btn duo-btn-gray duo-btn-disabled";
            actionBtn.innerHTML = "检查答案";
            actionBtn.onclick = null;

            if (currentLesson.queue.length === 0) {
                // 队列答完，进入结算
                finishLesson();
                return;
            }

            // 取出队首题目
            const q = currentLesson.queue[0];
            currentLesson.currentQuestion = q;

            // 渲染答题区域
            const area = document.getElementById('lesson-body-area');
            
            if (q.type === 'audio-to-char') {
                renderAudioToChar(area, q);
            } else if (q.type === 'char-to-morse') {
                renderCharToMorse(area, q);
            } else if (q.type === 'matching') {
                renderMatching(area, q);
            } else if (q.type === 'translation') {
                renderTranslation(area, q);
            }

            // 播放音频（如果是听力题，自动响一次）
            if (q.type === 'audio-to-char') {
                setTimeout(() => morsePlayer.play(q.morse, 1.0), 300);
            } else if (q.type === 'char-to-morse') {
                // 如果是输入摩斯码题，自动播放一次记忆卡片点划闪烁和对应音频
                setTimeout(() => playMorseSoundWithFlash(q.target), 400);
            }
        }

        // --- 题型 1: 听音辨字 ---
        function renderAudioToChar(area, q) {
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <div class="option-card" onclick="selectOption('${opt}')" id="opt-${opt}">
                        <span class="option-shortcut">${idx + 1}</span>
                        ${opt}
                    </div>
                `;
            });

            area.innerHTML = `
                <div class="lesson-question-container">
                    <div class="question-title">听电报声音，选择对应的字母</div>
                    
                    <div class="audio-buttons-row">
                        <button class="audio-play-btn" onclick="playMorseSound('${q.morse}')" title="播放电报 (Space)">🔊</button>
                    </div>

                    <div class="options-grid">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        function selectOption(val) {
            // 取消上次选择的
            if (currentLesson.selectedOption) {
                const prev = document.getElementById(`opt-${currentLesson.selectedOption}`);
                if (prev) prev.classList.remove('selected');
            }
            currentLesson.selectedOption = val;
            document.getElementById(`opt-${val}`).classList.add('selected');

            // 激活底部检查按钮
            enableCheckButton();
        }

        function enableCheckButton() {
            const actionBtn = document.getElementById('lesson-action-btn');
            actionBtn.className = "duo-btn duo-btn-green";
            actionBtn.onclick = () => checkAnswer();
        }

        // --- 题型 2: 输入摩斯码 ---
        function renderCharToMorse(area, q) {
            area.innerHTML = `
                <div class="lesson-question-container">
                    <div class="question-title">请输入字母 「 ${q.target} 」 的摩斯密码</div>
                    
                    <!-- 记忆联想叠加层，辅助记忆 -->
                    <div class="mnemonic-container">
                        ${renderMnemonicSvg(q.target)}
                    </div>

                    <div class="input-code-display" id="morse-input-display">...</div>

                    <div class="morse-input-panel">
                        <button class="duo-btn duo-btn-blue morse-input-btn" onclick="pressMorseChar('.')">
                            <span class="btn-symbol">
                                <span class="morse-visual-char morse-visual-dot" style="background-color: white; width: 14px; height: 14px; border-radius: 50%; display: inline-block;"></span>
                            </span>
                            <span class="btn-label">嘀</span>
                        </button>
                        <button class="duo-btn duo-btn-blue morse-input-btn" onclick="pressMorseChar('-')">
                            <span class="btn-symbol">
                                <span class="morse-visual-char morse-visual-dash" style="background-color: white; width: 36px; height: 12px; border-radius: 6px; display: inline-block;"></span>
                            </span>
                            <span class="btn-label">哒</span>
                        </button>
                        <button class="duo-btn duo-btn-gray morse-backspace-btn" onclick="pressBackspace()">
                            <span class="btn-symbol">⌫</span>
                            <span class="btn-label">退格</span>
                        </button>
                    </div>
                    <div class="keyboard-hint">快捷键：键盘 [ . ] 输入点， [ - ] 输入划， [ Backspace ] 退格， [ Enter ] 提交</div>
                </div>
            `;
            updateInputDisplay();
        }

        function pressMorseChar(ch) {
            // 限制摩斯码最长5位
            if (currentLesson.morseInput.length < 6) {
                currentLesson.morseInput += ch;
                updateInputDisplay();
                enableCheckButton();
                // 伴随播放对应点/划的嘀哒音效
                playMorseUnit(ch === '.' ? 'dot' : 'dash');
            }
        }

        function pressBackspace() {
            currentLesson.morseInput = currentLesson.morseInput.slice(0, -1);
            updateInputDisplay();
            if (currentLesson.morseInput.length === 0) {
                const actionBtn = document.getElementById('lesson-action-btn');
                actionBtn.className = "duo-btn duo-btn-gray duo-btn-disabled";
                actionBtn.onclick = null;
            }
        }

        function updateInputDisplay() {
            const display = document.getElementById('morse-input-display');
            if (currentLesson.morseInput) {
                display.classList.add('has-content');
                display.innerHTML = getMorseVisualHtml(currentLesson.morseInput);
            } else {
                display.classList.remove('has-content');
                display.innerHTML = '<span class="display-placeholder">等待输入摩斯码...</span>';
            }
        }

        // --- 题型 3: 配对连线 ---
        function renderMatching(area, q) {
            let leftHtml = '';
            q.leftItems.forEach((char, idx) => {
                leftHtml += `
                    <div class="match-card" id="match-l-${idx}" onclick="selectMatchItem(${idx}, 'left')">
                        ${char}
                    </div>
                `;
            });

            let rightHtml = '';
            q.rightItems.forEach((item, idx) => {
                rightHtml += `
                    <div class="match-card" id="match-r-${idx}" onclick="selectMatchItem(${idx}, 'right')">
                        ${getMorseVisualHtml(item.morse)}
                    </div>
                `;
            });

            area.innerHTML = `
                <div class="lesson-question-container">
                    <div class="question-title">将字母与其相对应的摩斯码配对连线</div>
                    
                    <div class="matching-columns">
                        <div class="matching-column">
                            ${leftHtml}
                        </div>
                        <div class="matching-column">
                            ${rightHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectMatchItem(idx, side) {
            if (side === 'left') {
                if (currentLesson.pairedLeft.has(idx)) return; // 已经配对的跳过

                if (currentLesson.selectedMatchLeft !== null) {
                    document.getElementById(`match-l-${currentLesson.selectedMatchLeft}`).classList.remove('selected');
                }
                currentLesson.selectedMatchLeft = idx;
                document.getElementById(`match-l-${idx}`).classList.add('selected');
            } else {
                if (currentLesson.pairedRight.has(idx)) return;

                if (currentLesson.selectedMatchRight !== null) {
                    document.getElementById(`match-r-${currentLesson.selectedMatchRight}`).classList.remove('selected');
                }
                currentLesson.selectedMatchRight = idx;
                document.getElementById(`match-r-${idx}`).classList.add('selected');
            }

            // 触发连线核对
            if (currentLesson.selectedMatchLeft !== null && currentLesson.selectedMatchRight !== null) {
                checkMatchPair();
            }
        }

        function checkMatchPair() {
            const leftIdx = currentLesson.selectedMatchLeft;
            const rightIdx = currentLesson.selectedMatchRight;
            
            const leftChar = currentLesson.currentQuestion.leftItems[leftIdx];
            const rightMorse = currentLesson.currentQuestion.rightItems[rightIdx].morse;
            const rightChar = currentLesson.currentQuestion.rightItems[rightIdx].char;

            const lCard = document.getElementById(`match-l-${leftIdx}`);
            const rCard = document.getElementById(`match-r-${rightIdx}`);

            if (leftChar === rightChar) {
                // 配对成功
                morsePlayer.playFeedbackSound(true);
                lCard.className = "match-card paired";
                rCard.className = "match-card paired";

                currentLesson.pairedLeft.add(leftIdx);
                currentLesson.pairedRight.add(rightIdx);

                // 重置选中
                currentLesson.selectedMatchLeft = null;
                currentLesson.selectedMatchRight = null;

                // 判断是否全部配对完成
                if (currentLesson.pairedLeft.size === 4) {
                    enableCheckButton();
                    // 配对成功后自动点一下 Check 进入结算反馈
                    setTimeout(() => checkAnswer(), 300);
                }
            } else {
                // 配对失败，短暂闪红并抖动
                morsePlayer.playFeedbackSound(false);
                lCard.className = "match-card error-blink";
                rCard.className = "match-card error-blink";

                setTimeout(() => {
                    lCard.className = "match-card";
                    rCard.className = "match-card";
                    lCard.classList.remove('selected');
                    rCard.classList.remove('selected');
                }, 400);

                currentLesson.selectedMatchLeft = null;
                currentLesson.selectedMatchRight = null;
            }
        }

        // --- 题型 4: 翻译识别 ---
        function renderTranslation(area, q) {
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <div class="option-card" onclick="selectOption('${opt}')" id="opt-${opt}">
                        <span class="option-shortcut">${idx + 1}</span>
                        ${opt}
                    </div>
                `;
            });

            area.innerHTML = `
                <div class="lesson-question-container">
                    <div class="question-title" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                        摩斯码 「 ${getMorseVisualHtml(q.morse)} 」 翻译后是哪一个字符？
                    </div>
                    <div class="options-grid">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        // ================= CHECK AND ACTION CONTROL =================
        function checkAnswer() {
            const q = currentLesson.currentQuestion;
            let isCorrect = false;

            if (q.type === 'audio-to-char' || q.type === 'translation') {
                isCorrect = (currentLesson.selectedOption === q.target);
            } else if (q.type === 'char-to-morse') {
                isCorrect = (currentLesson.morseInput === q.morse);
            } else if (q.type === 'matching') {
                isCorrect = true; // 配对连线在卡片层面已经异步核对，到这里直接通过
            }

            // 渲染反馈条
            const row = document.getElementById('feedback-row');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-message');
            const footer = document.getElementById('lesson-footer-panel');

            row.style.display = 'flex';

            if (isCorrect) {
                morsePlayer.playFeedbackSound(true);
                footer.className = "lesson-footer-panel feedback-correct";
                icon.textContent = "✓";
                title.textContent = "回答正确！";
                msg.innerHTML = `字母 ${q.target} 的摩斯电码正是: ${getMorseVisualHtml(q.morse)}`;

                // 只有非重练题才算进度
                if (!currentLesson.wrongAnswers.has(q.target)) {
                    currentLesson.correctCount++;
                }
            } else {
                morsePlayer.playFeedbackSound(false);
                footer.className = "lesson-footer-panel feedback-incorrect";
                icon.textContent = "✗";
                title.textContent = "回答错误！";
                msg.innerHTML = `正确答案是 ${q.target} : ${getMorseVisualHtml(q.morse)}`;

                // 如果是输入题，答错后立即自动清空已输入内容
                if (q.type === 'char-to-morse') {
                    currentLesson.morseInput = '';
                    updateInputDisplay();
                }

                // 自动播放正确答案的发音，并在输入题的记忆图案中同步发光闪烁
                setTimeout(() => {
                    playMorseSoundWithFlash(q.target);
                }, 500);

                // 记录错误并将本题追加到队列尾部以待重练
                currentLesson.errorCount++;
                currentLesson.wrongAnswers.add(q.target);
                currentLesson.queue.push(q);

                // 扣减生命值
                if (!currentLesson.isPractice) {
                    currentLesson.hearts--;
                    updateLessonHeartsUI();
                    
                    // 心形抖动动画
                    const heartContainer = document.getElementById('lesson-hearts-container');
                    heartContainer.classList.add('heart-shattered');
                    setTimeout(() => heartContainer.classList.remove('heart-shattered'), 600);

                    // 检查是否死亡
                    if (currentLesson.hearts <= 0) {
                        setTimeout(() => handleLevelFailed(), 500);
                        return;
                    }
                }
            }

            // 将刚才完成的题目从队列首部移出
            currentLesson.queue.shift();

            // 更新进度条
            updateProgressBar();

            // 底部按钮切换为“继续”
            const actionBtn = document.getElementById('lesson-action-btn');
            actionBtn.className = "duo-btn duo-btn-green";
            actionBtn.innerHTML = "继续";
            actionBtn.onclick = () => nextQuestion();
        }

        function handleFooterAction() {
            // 该函数一般用作快捷回车绑定
            const actionBtn = document.getElementById('lesson-action-btn');
            if (actionBtn.classList.contains('duo-btn-disabled')) return;
            actionBtn.click();
        }

        // ================= LEVEL FAILED MODAL =================
        function handleLevelFailed() {
            const modal = document.getElementById('modal-container');
            
            // 是否有足够 XP 复活
            const canRevive = state.xp >= 50;
            const reviveBtnClass = canRevive ? "duo-btn duo-btn-green" : "duo-btn duo-btn-gray duo-btn-disabled";
            const clickAction = canRevive ? "buyLifeWithXp()" : "";

            modal.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon">💔</div>
                    <div class="modal-title">生命值耗尽</div>
                    <div class="modal-desc">别灰心！摩斯密码需要反复训练。你可以选择花费 50 XP 补满生命值继续，或重新开始。</div>
                    <div class="modal-buttons">
                        <button class="${reviveBtnClass}" onclick="${clickAction}">✨ 花费 50 XP 续命</button>
                        <button class="duo-btn duo-btn-gray" onclick="exitLessonDirectly()">免费重新开始</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function buyLifeWithXp() {
            if (state.xp >= 50) {
                state.xp -= 50;
                saveGameState();
                currentLesson.hearts = currentLesson.maxHearts;
                updateLessonHeartsUI();
                
                // 隐藏模态框
                document.getElementById('modal-container').classList.add('hidden');
                
                // 自动继续下一题
                nextQuestion();
            }
        }

        function exitLessonDirectly() {
            document.getElementById('modal-container').classList.add('hidden');
            exitLesson();
        }

        function confirmExitLesson() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon">🚪</div>
                    <div class="modal-title">确定要退出吗？</div>
                    <div class="modal-desc">现在退出，当前关卡的学习进度将会丢失。</div>
                    <div class="modal-buttons">
                        <button class="duo-btn duo-btn-red" onclick="exitLessonDirectly()">确认退出</button>
                        <button class="duo-btn duo-btn-gray" onclick="closeModal()">留下继续</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function exitLesson() {
            document.getElementById('lesson-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('app-status-bar').classList.remove('hidden');
            renderLevelMap();
        }

        // ================= SCREEN: RESULT & Persistency =================
        function finishLesson() {
            document.getElementById('lesson-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // 1. 计算获得的 XP 和星星
            let xpGained = 15;
            let stars = 1;
            
            if (currentLesson.errorCount === 0) {
                stars = 3;
                xpGained = 20; // 完美奖励 5 XP
            } else if (currentLesson.errorCount <= 2) {
                stars = 2;
                xpGained = 15;
            } else {
                stars = 1;
                xpGained = 10;
            }

            // 如果是综合练习，加成减半
            if (currentLesson.isPractice) {
                stars = 3;
                xpGained = 5;
            }

            // 2. 更新全局状态
            state.xp += xpGained;
            
            // 连续学习天数判定
            updateStreakCount();

            // 如果是当前最高解锁关卡，则解锁下一关
            if (!currentLesson.isPractice && currentLesson.id === state.unlockedLevel) {
                if (state.unlockedLevel < levels.length) {
                    state.unlockedLevel++;
                }
            }

            saveGameState();

            // 3. UI 展现
            document.getElementById('result-xp-gain').textContent = `+${xpGained} XP`;
            
            const rawAccuracy = ((currentLesson.totalOriginalCount) / (currentLesson.totalOriginalCount + currentLesson.errorCount)) * 100;
            document.getElementById('result-accuracy').textContent = `${Math.round(rawAccuracy)}%`;
            
            document.getElementById('result-main-title').textContent = currentLesson.isPractice ? "温习完成！" : "关卡通过！";

            // 渲染星星动画
            const starNodes = document.querySelectorAll('.result-star');
            starNodes.forEach((s, idx) => {
                s.classList.remove('active');
                if (idx < stars) {
                    setTimeout(() => {
                        s.classList.add('active');
                    }, idx * 250);
                }
            });

            // 4. 纸屑庆祝动画
            initConfetti();
        }

        function updateStreakCount() {
            const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
            const lastDateStr = state.lastCompletedDate;
            let streak = state.streak;

            if (!lastDateStr) {
                streak = 1;
            } else {
                const diffTime = Math.abs(new Date(todayStr) - new Date(lastDateStr));
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays === 1) {
                    streak += 1;
                } else if (diffDays > 1) {
                    streak = 1;
                }
            }
            state.streak = streak;
            state.lastCompletedDate = todayStr;
        }

        function exitResultToHome() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('app-status-bar').classList.remove('hidden');
            renderLevelMap();
        }

        // ================= RESET PROGRESS =================
        function showResetConfirmModal() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon">⚠️</div>
                    <div class="modal-title">重置所有数据？</div>
                    <div class="modal-desc">重置后，你的经验值、连续天数及所有关卡解锁状态将彻底清空。此操作不可逆！</div>
                    <div class="modal-buttons">
                        <button class="duo-btn duo-btn-red" onclick="resetAllData()">确认彻底重置</button>
                        <button class="duo-btn duo-btn-gray" onclick="closeModal()">取消</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function resetAllData() {
            localStorage.removeItem('morse_game_state');
            state = {
                xp: 0,
                streak: 0,
                unlockedLevel: 1,
                lastCompletedDate: null
            };
            saveGameState();
            closeModal();
            renderLevelMap();
        }

        // 一键解锁全部关卡 (开发者调试通道)
        function unlockAllLevelsCheat() {
            state.unlockedLevel = levels.length;
            state.xp = Math.max(state.xp, 100);
            saveGameState();
            renderLevelMap();
            alert("🔓 所有关卡已解锁！已开启综合温习。");
        }

        // ================= KEYBOARD SHORTCUTS =================
        document.addEventListener('keydown', (e) => {
            // 只在答题状态下捕获键盘快捷键
            const lessonScreen = document.getElementById('lesson-screen');
            if (lessonScreen.classList.contains('hidden')) return;

            const q = currentLesson.currentQuestion;
            if (!q) return;

            // 空格键：播放音频（限听音辨字）
            if (q.type === 'audio-to-char' && e.code === 'Space') {
                e.preventDefault();
                playMorseSound(q.morse);
            }

            // 数字键选择选项 (1-4)
            if ((q.type === 'audio-to-char' || q.type === 'translation') && ['1', '2', '3', '4'].includes(e.key)) {
                e.preventDefault();
                const optIndex = parseInt(e.key) - 1;
                if (q.options && q.options[optIndex]) {
                    selectOption(q.options[optIndex]);
                }
            }

            // 摩斯码键盘直输 (. / - / Backspace)
            if (q.type === 'char-to-morse') {
                if (e.key === '.' || e.key === '*') {
                    e.preventDefault();
                    pressMorseChar('.');
                } else if (e.key === '-' || e.key === '_') {
                    e.preventDefault();
                    pressMorseChar('-');
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    pressBackspace();
                }
            }

            // Enter 键核对或继续
            if (e.key === 'Enter') {
                e.preventDefault();
                handleFooterAction();
            }
        });

        // ================= CONFETTI CELEBRATION EFFECT =================
        let confetti = [];
        let confettiTimer = null;

        function initConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            confetti = [];
            const colors = ['#FFC800', '#58CC02', '#1CB0F6', '#FF4B4B', '#FF8A80', '#B2FF59'];

            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            if (confettiTimer) cancelAnimationFrame(confettiTimer);
            
            let start = Date.now();
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let remaining = false;

                confetti.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    if (p.y < canvas.height) {
                        remaining = true;
                    }

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                });

                // 运行 3.5 秒后自动停止，或者雨落尽后停止
                if (remaining && Date.now() - start < 3500) {
                    confettiTimer = requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            draw();
        }

        // ================= ON LOAD INITIALIZATION =================
        window.onload = () => {
            loadGameState();
            renderLevelMap();
        };

        // 窗口拉伸时重新绘制地图连接线以保证精准对齐
        window.onresize = () => {
            renderLevelMap();
        };

    </script>
</body>
